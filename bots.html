<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoofCapital — Bots</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #1f1f1f;
      --accent: #00e676; --accent-dim: #00c853; --red: #ff1744;
      --text: #f5f5f5; --muted: #888; --card-bg: #141414;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    #loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app { display: none; flex-direction: column; height: 100vh; overflow: hidden; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 64px; background: rgba(10,10,10,0.95); border-bottom: 1px solid var(--border); flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.02em; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }

    .layout { display: flex; flex: 1; overflow: hidden; }

    .sidebar { width: 230px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px 0; height: calc(100vh - 64px); position: sticky; top: 64px; overflow-y: auto; }
    .sidebar-section { padding: 6px 12px; font-size: 0.7rem; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 12px; }
    .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-left: 3px solid transparent; font-size: 0.9rem; font-weight: 500; color: var(--muted); text-decoration: none; transition: background 0.15s, color 0.15s; position: relative; border: none; background: none; font-family: inherit; width: 100%; text-align: left; cursor: pointer; }
    .sidebar-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .sidebar-item.active { background: rgba(0,230,118,0.08); color: var(--accent); border-left-color: var(--accent); font-weight: 600; }
    

    main { flex: 1; overflow-y: auto; }
    .bots-col { padding: 28px 28px; }
    .activity-toggle { background: none; border: 1px solid #2a2a2a; color: var(--muted); font-size: 0.75rem; font-weight: 700; padding: 5px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .activity-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .create-bot-modal { background: #111; border: 1px solid #222; border-radius: 16px; width: 92%; max-width: 420px; padding: 28px 28px 24px; display: flex; flex-direction: column; gap: 18px; }
    .create-bot-modal h2 { font-size: 1rem; font-weight: 800; }
    .create-bot-field { display: flex; flex-direction: column; gap: 6px; }
    .create-bot-field label { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .create-bot-field input, .create-bot-field select { background: #0f0f0f; border: 1px solid #2a2a2a; color: var(--text); font-family: inherit; font-size: 0.88rem; padding: 9px 12px; border-radius: 8px; width: 100%; outline: none; transition: border-color 0.15s; }
    .create-bot-field input:focus, .create-bot-field select:focus { border-color: var(--accent); }
    .create-bot-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .create-bot-cancel { background: none; border: 1px solid #2a2a2a; color: var(--muted); font-family: inherit; font-size: 0.85rem; padding: 9px 20px; border-radius: 8px; cursor: pointer; }
    .create-bot-cancel:hover { border-color: #555; color: var(--text); }
    .create-bot-submit { background: var(--accent); color: #000; font-family: inherit; font-size: 0.85rem; font-weight: 700; padding: 9px 22px; border-radius: 8px; border: none; cursor: pointer; }
    .create-bot-submit:hover { background: var(--accent-dim); }
    .activity-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .activity-modal-overlay.open { display: flex; }
    .activity-modal { background: #111; border: 1px solid #222; border-radius: 16px; width: 96%; max-width: 1100px; height: 88vh; display: flex; flex-direction: column; overflow: hidden; }
    .activity-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 28px 16px; border-bottom: 1px solid #1f1f1f; flex-shrink: 0; }
    .activity-modal-title { font-size: 1.1rem; font-weight: 800; }
    .activity-modal-close { background: none; border: 1px solid #2a2a2a; color: var(--muted); font-size: 1rem; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .activity-modal-close:hover { border-color: var(--red); color: var(--red); }
    .activity-modal-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 20px 28px; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
    .activity-modal-stat { background: #0a0a0a; border-radius: 10px; padding: 14px 18px; }
    .activity-modal-stat-label { font-size: 0.68rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.07em; }
    .activity-modal-stat-value { font-size: 1.4rem; font-weight: 900; margin-top: 4px; }
    .activity-modal-body { overflow-y: auto; padding: 0 28px 24px; flex: 1; }
    .act-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .act-table th { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #111; }
    .act-table td { padding: 14px 16px; font-size: 0.88rem; border-bottom: 1px solid #161616; vertical-align: middle; }
    .act-table tr:hover td { background: rgba(255,255,255,0.02); }
    .act-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .act-badge-buy { background: rgba(0,230,118,0.12); color: var(--accent); }
    .act-badge-sell { background: rgba(255,23,68,0.12); color: var(--red); }
    .act-badge-call { background: rgba(0,230,118,0.12); color: var(--accent); }
    .act-badge-put { background: rgba(255,193,7,0.12); color: #ffc107; }
    .act-badge-open { background: rgba(255,255,255,0.06); color: #888; }
    .act-badge-closed { background: rgba(0,230,118,0.08); color: #555; }
    .pnl-pos { color: var(--accent); font-weight: 700; }
    .pnl-neg { color: var(--red); font-weight: 700; }
    .act-section-label { font-size: 0.72rem; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin: 24px 0 10px; padding-bottom: 8px; border-bottom: 1px solid #1a1a1a; }
    .act-empty { color: var(--muted); font-size: 0.85rem; padding: 14px 0; }

    .page-header { margin-bottom: 28px; display: flex; align-items: center; justify-content: space-between; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }

    .bots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 8px; }

    /* Right panel */
    .trades-panel-header { padding: 18px 18px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .trades-panel-title { font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 14px; }
    .pnl-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pnl-stat { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 8px; padding: 10px 12px; }
    .pnl-stat-label { font-size: 0.62rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.06em; }
    .pnl-stat-value { font-size: 1.05rem; font-weight: 900; margin-top: 3px; }
    .pnl-stat-value.pos { color: var(--accent); }
    .pnl-stat-value.neg { color: var(--red); }
    .pnl-stat-value.neu { color: var(--text); }
    .trades-feed { flex: 1; overflow-y: auto; padding: 0; }
    .feed-empty { text-align: center; padding: 40px 16px; color: #444; font-size: 0.82rem; }
    .feed-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 18px; border-bottom: 1px solid #141414; gap: 8px; transition: background 0.1s; }
    .feed-row:hover { background: rgba(255,255,255,0.02); }
    .feed-row.new { animation: flashIn 0.6s ease; }
    @keyframes flashIn { from { background: rgba(0,230,118,0.08); } to { background: transparent; } }
    .feed-action { font-size: 0.68rem; font-weight: 800; padding: 3px 8px; border-radius: 8px; text-transform: uppercase; flex-shrink: 0; }
    .feed-action.buy { background: rgba(0,230,118,0.12); color: var(--accent); }
    .feed-action.sell { background: rgba(255,23,68,0.12); color: var(--red); }
    .feed-sym { font-weight: 800; font-size: 0.85rem; }
    .feed-price { font-size: 0.75rem; color: var(--muted); }
    .feed-pnl { font-size: 0.78rem; font-weight: 800; flex-shrink: 0; }
    .feed-pnl.pos { color: var(--accent); }
    .feed-pnl.neg { color: var(--red); }
    .feed-pnl.open { color: #555; }
    .feed-time { font-size: 0.68rem; color: #444; }
    .section-divider { display: flex; align-items: center; gap: 12px; margin: 32px 0 20px; }
    .section-divider-line { flex: 1; height: 1px; background: var(--border); }
    .section-divider-label { font-size: 0.72rem; font-weight: 800; color: #555; text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }
    .option-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,193,7,0.08); border: 1px solid rgba(255,193,7,0.2); color: #ffc107; font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .expiry-pill { padding: 5px 14px; border-radius: 20px; border: 1px solid #2a2a2a; background: transparent; color: var(--muted); font-size: 0.76rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .expiry-pill:hover { border-color: #ffc107; color: #ffc107; }
    .expiry-pill.active { border-color: #ffc107; background: rgba(255,193,7,0.1); color: #ffc107; }
    .new-options-btn { background: rgba(255,193,7,0.1); border: 1px solid rgba(255,193,7,0.3); color: #ffc107; font-size: 0.82rem; font-weight: 800; padding: 9px 18px; border-radius: 8px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .new-options-btn:hover { background: rgba(255,193,7,0.18); }
    @media (max-width: 900px) { .sidebar { display: none; } .bots-col { padding: 20px 16px; } }

    .bot-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 22px; display: flex; flex-direction: column; gap: 16px; transition: border-color 0.2s, box-shadow 0.2s; }
    .bot-card.running { border-color: rgba(0,230,118,0.35); box-shadow: 0 0 24px rgba(0,230,118,0.08); }
    .bot-card.stopped { opacity: 0.65; }

    .bot-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .bot-name { font-size: 1.05rem; font-weight: 800; }
    .bot-broker-tag { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 10px; border-radius: 20px; margin-top: 4px; display: inline-block; }
    .bot-broker-tastytrade { background: rgba(255,112,67,0.12); color: #ff7043; }
    .bot-broker-paper { background: rgba(0,230,118,0.1); color: var(--accent); }

    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
    .status-dot.on { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s infinite; }
    .status-dot.off { background: #444; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; }
    .status-badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-badge.running { background: rgba(0,230,118,0.12); color: var(--accent); border: 1px solid rgba(0,230,118,0.25); }
    .status-badge.running::before { background: var(--accent); box-shadow: 0 0 5px var(--accent); animation: pulse 2s infinite; }
    .status-badge.stopped { background: rgba(255,255,255,0.04); color: #666; border: 1px solid #222; }
    .status-badge.stopped::before { background: #444; }
    .status-badge.paused { background: rgba(255,193,7,0.1); color: #ffc107; border: 1px solid rgba(255,193,7,0.2); }
    .status-badge.paused::before { background: #ffc107; }

    .bot-toggles { display: flex; flex-direction: column; gap: 10px; background: #0f0f0f; border-radius: 10px; padding: 14px; }
    .bot-toggle-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.84rem; color: var(--muted); }
    .toggle-switch { position: relative; width: 40px; height: 22px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #2a2a2a; border-radius: 22px; cursor: pointer; transition: background 0.2s; }
    .toggle-slider:before { content: ''; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #888; border-radius: 50%; transition: transform 0.2s, background 0.2s; }
    .toggle-switch input:checked + .toggle-slider { background: rgba(0,230,118,0.2); }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(18px); background: var(--accent); }

    .big-toggle-wrap { display: flex; align-items: center; justify-content: space-between; }
    .big-toggle-label { font-size: 1rem; font-weight: 700; color: var(--text); }
    .big-toggle-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .big-toggle-switch { position: relative; width: 52px; height: 28px; }
    .big-toggle-switch input { opacity: 0; width: 0; height: 0; }
    .big-toggle-slider { position: absolute; inset: 0; background: #2a2a2a; border-radius: 28px; cursor: pointer; transition: background 0.2s; }
    .big-toggle-slider:before { content: ''; position: absolute; height: 20px; width: 20px; left: 4px; bottom: 4px; background: #666; border-radius: 50%; transition: transform 0.2s, background 0.2s; }
    .big-toggle-switch input:checked + .big-toggle-slider { background: rgba(0,230,118,0.25); }
    .big-toggle-switch input:checked + .big-toggle-slider:before { transform: translateX(24px); background: var(--accent); }

    .webhook-box { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
    .webhook-url { font-family: 'Courier New', monospace; font-size: 0.72rem; color: #7fffb2; flex: 1; word-break: break-all; }
    .copy-btn { background: none; border: 1px solid #2a2a2a; color: var(--muted); font-size: 0.72rem; font-weight: 600; padding: 4px 10px; border-radius: 5px; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; transition: border-color 0.15s, color 0.15s; }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    .bot-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-box { background: #0f0f0f; border-radius: 8px; padding: 10px 14px; }
    .stat-label { font-size: 0.7rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-value { font-size: 1rem; font-weight: 800; margin-top: 3px; }
    .stat-value.green { color: var(--accent); }
    .stat-value.red { color: var(--red); }
    .stat-value.neutral { color: var(--text); }

    .pnl-banner { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; margin-bottom: 28px; }
    .pnl-banner-item { display: flex; flex-direction: column; gap: 4px; }
    .pnl-banner-label { font-size: 0.7rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.08em; }
    .pnl-banner-value { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.03em; }
    .pnl-banner-sub { font-size: 0.75rem; color: var(--muted); }

    .pnl-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .pnl-box { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px; padding: 10px 14px; text-align: center; }
    .pnl-box-label { font-size: 0.65rem; color: #555; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .pnl-box-value { font-size: 0.95rem; font-weight: 800; margin-top: 2px; }

    .trade-log { margin-top: 6px; }
    .trade-log-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #141414; font-size: 0.8rem; }
    .trade-log-row:last-child { border-bottom: none; }
    .trade-log-sym { font-weight: 700; color: var(--text); }
    .trade-log-action { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .trade-log-action.buy { background: rgba(0,230,118,0.1); color: var(--accent); }
    .trade-log-action.sell { background: rgba(255,23,68,0.1); color: var(--red); }
    .trade-log-pnl.pos { color: var(--accent); font-weight: 700; }
    .trade-log-pnl.neg { color: var(--red); font-weight: 700; }
    .trade-log-pnl.open { color: var(--muted); }

    .pine-section { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 10px; padding: 16px; }
    .pine-section h3 { font-size: 0.82rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
    .pine-code { font-family: 'Courier New', monospace; font-size: 0.75rem; color: #7fffb2; background: #080808; border-radius: 8px; padding: 14px; white-space: pre-wrap; word-break: break-word; line-height: 1.6; }
    .pine-code .kw { color: #82b1ff; }
    .pine-code .fn { color: #ffd740; }
    .pine-code .str { color: #f48fb1; }
    .pine-code .cmt { color: #555; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.9rem; border: 1px dashed var(--border); border-radius: 10px; margin-top: 8px; }

    .btn-primary { background: var(--accent); color: #000; font-size: 0.88rem; font-weight: 800; padding: 10px 22px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .btn-primary:hover { background: var(--accent-dim); }

    .user-dropdown { position: relative; }
    .user-dropdown-toggle { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; font-size: 0.88rem; color: var(--muted); font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .user-dropdown-toggle:hover { background: #1a1a1a; color: var(--text); }
    .user-dropdown-toggle::after { content: '▾'; font-size: 0.7rem; color: var(--accent); }
    .user-dropdown-menu { position: absolute; top: calc(100% + 8px); right: 0; min-width: 180px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.4); opacity: 0; visibility: hidden; transform: translateY(-8px); transition: all 0.2s; z-index: 100; }
    .user-dropdown.open .user-dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
    .user-dropdown-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; font-size: 0.85rem; color: var(--text); cursor: pointer; transition: background 0.2s; border: none; background: none; width: 100%; text-align: left; font-family: inherit; }
    .user-dropdown-item:hover { background: rgba(255,255,255,0.05); }
    .user-dropdown-item.red { color: var(--red); }
    .nav-right { display: flex; align-items: center; gap: 16px; }

    .section-label { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }

    .mode-tabs { display: flex; gap: 6px; }
    .mode-tab { padding: 5px 14px; border-radius: 20px; border: 1px solid #2a2a2a; background: transparent; color: var(--muted); font-size: 0.76rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .mode-tab.active { border-color: var(--accent); background: rgba(0,230,118,0.1); color: var(--accent); }

    .auto-settings { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .auto-settings-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 0.82rem; color: var(--muted); }

    async function refreshOptBalance(botId) {
      const el = document.getElementById('opt-paper-bal-' + botId);
      const pctEl = document.getElementById('opt-paper-pct-' + botId);
      if (!el) return;
      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/options-bot?bot_id=${botId}`, {
          headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        const data = await res.json();
        if (data.total != null) {
          el.textContent = '$' + Number(data.total).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          if (pctEl) {
            const pct = ((data.total - 100000) / 100000) * 100;
            pctEl.textContent = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
            pctEl.style.color = pct >= 0 ? 'var(--accent)' : 'var(--red)';
          }
        }
      } catch (_) {}
    }

    function actStockRow(tr) {
      const side = tr.direction || (tr.action === 'buy' ? 'Long' : 'Short');
      const entry = tr.entry_price ?? tr.price;
      const pnlHtml = tr.pnl != null
        ? `<span class="${tr.pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${tr.pnl >= 0 ? '+' : ''}$${Number(tr.pnl).toFixed(2)}</span>`
        : '—';
      return `<tr>
        <td style="font-weight:600;">${tr.symbol || '—'}</td>
        <td><span class="act-badge ${side==='Long'?'act-badge-buy':'act-badge-sell'}">${side}</span></td>
        <td>${tr.quantity || '—'}</td>
        <td>${entry ? '$'+Number(entry).toFixed(2) : '—'}</td>
        <td>${pnlHtml}</td>
        <td style="color:var(--muted);font-size:0.8rem;">${tr.broker || 'paper'}</td>
        <td style="color:var(--muted);font-size:0.78rem;">${actTimeStr(tr.created_at)}</td>
      </tr>`;
    }

    function actStockTable(rows) {
      return `<table class="act-table"><thead><tr><th>Symbol</th><th>Side</th><th>Qty</th><th>Entry</th><th>P&amp;L</th><th>Broker</th><th>Date</th></tr></thead><tbody>${rows.join('')}</tbody></table>`;
    }

    function actOptionsRow(tr) {
      const isCall = tr.option_type === 'call';
      const pnlHtml = tr.pnl != null
        ? `<span class="${tr.pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${tr.pnl >= 0 ? '+' : ''}$${Number(tr.pnl).toFixed(2)}</span>`
        : '—';
      return `<tr>
        <td style="font-weight:600;">${tr.symbol || '—'}</td>
        <td><span class="act-badge ${isCall?'act-badge-call':'act-badge-put'}">${isCall?'CALL':'PUT'}</span></td>
        <td>$${tr.strike}</td>
        <td>${tr.expiration_date || '—'}</td>
        <td>${tr.contracts} contract${tr.contracts>1?'s':''}</td>
        <td>$${Number(tr.premium_per_contract).toFixed(2)}</td>
        <td>${pnlHtml}</td>
        <td style="color:var(--muted);font-size:0.78rem;">${actTimeStr(tr.created_at)}</td>
      </tr>`;
    }

    function actOptionsTable(rows) {
      return `<table class="act-table"><thead><tr><th>Symbol</th><th>Type</th><th>Strike</th><th>Expiry</th><th>Contracts</th><th>Premium</th><th>P&amp;L</th><th>Date</th></tr></thead><tbody>${rows.join('')}</tbody></table>`;
    }

    async function openBotActivityModal(id, name, type) {
      document.getElementById('activity-modal-title').textContent = name + ' — Activity';
      document.getElementById('activity-modal-body').innerHTML = '<div class="feed-empty">Loading...</div>';
      document.getElementById('activity-modal-stats').innerHTML = '';
      document.getElementById('activity-modal-overlay').classList.add('open');

      if (type === 'stock') {
        const { data: trades } = await sbClient.from('trades')
          .select('symbol, action, direction, price, entry_price, quantity, pnl, status, failure_reason, created_at, closed_at, broker')
          .eq('user_id', currentUserId).eq('system_id', id).eq('source', 'auto')
          .order('created_at', { ascending: false }).limit(500);
        const t = trades || [];
        const openT   = t.filter(x => x.status === 'filled' && x.pnl == null);
        const closedT = t.filter(x => x.status === 'closed');
        const failedT = t.filter(x => x.status === 'failed');
        const totalPnl = closedT.reduce((s, x) => s + Number(x.pnl), 0);
        const winRate = closedT.length > 0 ? Math.round(closedT.filter(x => x.pnl > 0).length / closedT.length * 100) : 0;
        document.getElementById('activity-modal-stats').innerHTML = `
          <div class="activity-modal-stat"><div class="activity-modal-stat-label">Total P&amp;L</div><div class="activity-modal-stat-value" style="color:${totalPnl>=0?'var(--accent)':'var(--red)'}">${totalPnl>=0?'+':''}$${totalPnl.toFixed(2)}</div></div>
          <div class="activity-modal-stat"><div class="activity-modal-stat-label">Win Rate</div><div class="activity-modal-stat-value">${winRate}%</div></div>
          <div class="activity-modal-stat"><div class="activity-modal-stat-label">Closed Trades</div><div class="activity-modal-stat-value">${closedT.length}</div></div>
          <div class="activity-modal-stat"><div class="activity-modal-stat-label">Open</div><div class="activity-modal-stat-value">${openT.length}</div></div>`;
        if (!t.length) { document.getElementById('activity-modal-body').innerHTML = '<div class="feed-empty" style="padding:40px;">No trades yet for this bot.</div>'; return; }
        let html = '';
        html += `<div class="act-section-label">Open Positions (${openT.length})</div>`;
        html += openT.length ? actStockTable(openT.map(actStockRow)) : '<div class="act-empty">No open positions.</div>';
        html += `<div class="act-section-label">Closed Trades (${closedT.length})</div>`;
        html += closedT.length ? actStockTable(closedT.map(actStockRow)) : '<div class="act-empty">No closed trades.</div>';
        html += `<div class="act-section-label">Failed Trades (${failedT.length})</div>`;
        if (failedT.length) {
          const failRows = failedT.map(tr => {
            const side = tr.direction || (tr.action === 'buy' ? 'Long' : 'Short');
            const entry = tr.entry_price ?? tr.price;
            return `<tr>
              <td style="font-weight:600;">${tr.symbol || '—'}</td>
              <td><span class="act-badge ${side==='Long'?'act-badge-buy':'act-badge-sell'}">${side}</span></td>
              <td>${tr.quantity || '—'}</td>
              <td>${entry ? '$'+Number(entry).toFixed(2) : '—'}</td>
              <td style="color:var(--red);font-size:0.85rem;">${tr.failure_reason || 'Insufficient balance'}</td>
              <td style="color:var(--muted);font-size:0.78rem;">${actTimeStr(tr.created_at)}</td>
            </tr>`;
          });
          html += `<table class="act-table"><thead><tr><th>Symbol</th><th>Side</th><th>Qty</th><th>Entry</th><th>Reason</th><th>Date</th></tr></thead><tbody>${failRows.join('')}</tbody></table>`;
        } else {
          html += '<div class="act-empty">No failed trades.</div>';
        }
        document.getElementById('activity-modal-body').innerHTML = html;
      } else {
        const { data: trades } = await sbClient.from('options_trades')
          .select('symbol, option_type, strike, expiration_date, contracts, premium_per_contract, pnl, status, created_at')
          .eq('user_id', currentUserId).eq('bot_id', id)
          .order('created_at', { ascending: false }).limit(500);
        const t = trades || [];
        const openT   = t.filter(x => x.status === 'open');
        const closedT = t.filter(x => x.status === 'closed');
        const failedT = t.filter(x => x.status === 'failed');
        const totalPnl = closedT.reduce((s, x) => s + Number(x.pnl), 0);
        const winRate = closedT.length > 0 ? Math.round(closedT.filter(x => x.pnl > 0).length / closedT.length * 100) : 0;
        document.getElementById('activity-modal-stats').innerHTML = `
          <div class="activity-modal-stat"><div class="activity-modal-stat-label">Total P&amp;L</div><div class="activity-modal-stat-value" style="color:${totalPnl>=0?'var(--accent)':'var(--red)'}">${totalPnl>=0?'+':''}$${totalPnl.toFixed(2)}</div></div>
          <div class="activity-modal-stat"><div class="activity-modal-stat-label">Win Rate</div><div class="activity-modal-stat-value">${winRate}%</div></div>
          <div class="activity-modal-stat"><div class="activity-modal-stat-label">Closed Trades</div><div class="activity-modal-stat-value">${closedT.length}</div></div>
          <div class="activity-modal-stat"><div class="activity-modal-stat-label">Open</div><div class="activity-modal-stat-value">${openT.length}</div></div>`;
        if (!t.length) { document.getElementById('activity-modal-body').innerHTML = '<div class="feed-empty" style="padding:40px;">No trades yet for this bot.</div>'; return; }
        let html = '';
        html += `<div class="act-section-label">Open Positions (${openT.length})</div>`;
        html += openT.length ? actOptionsTable(openT.map(actOptionsRow)) : '<div class="act-empty">No open positions.</div>';
        html += `<div class="act-section-label">Closed Trades (${closedT.length})</div>`;
        html += closedT.length ? actOptionsTable(closedT.map(actOptionsRow)) : '<div class="act-empty">No closed trades.</div>';
        html += `<div class="act-section-label">Failed Trades (${failedT.length})</div>`;
        html += failedT.length ? actOptionsTable(failedT.map(actOptionsRow)) : '<div class="act-empty">No failed trades.</div>';
        document.getElementById('activity-modal-body').innerHTML = html;
      }
    }

    function closeActivityModal(e) {
      if (e && e.target !== document.getElementById('activity-modal-overlay')) return;
      document.getElementById('activity-modal-overlay').classList.remove('open');
    }

    async function init() {
      const { data: { session } } = await sbClient.auth.getSession();
      if (!session) { window.location.href = 'signin.html'; return; }
      currentUserId = session.user.id;

      // Gate: only allow access if bots_enabled in user_settings
      const isAdmin = session.user.id === 'd0bb84ba-f968-446c-9792-9bcff8849e37';
      if (!isAdmin) {
        const { data: settings } = await sbClient.from('user_settings').select('bots_enabled').eq('user_id', currentUserId).maybeSingle();
        if (!settings?.bots_enabled) { window.location.href = 'dashboard.html'; return; }
      }

      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';

      document.getElementById('user-email').textContent = session.user.email;
      // Show admin link if admin
      if (session.user.id === 'd0bb84ba-f968-446c-9792-9bcff8849e37') {
        const el = document.getElementById('admin-sidebar-link');
        const sec = document.getElementById('admin-sidebar-section');
        if (el) el.style.display = '';
        if (sec) sec.style.display = '';
      }

      const dropdown = document.getElementById('user-dropdown');
      document.getElementById('user-email-toggle').addEventListener('click', e => {
        e.stopPropagation();
        dropdown.classList.toggle('open');
      });
      document.addEventListener('click', e => {
        if (!dropdown.contains(e.target)) dropdown.classList.remove('open');
      });

      await loadBots();
      await loadOptionsBots();
    }

    async function signOut() {
      await sbClient.auth.signOut();
      window.location.href = 'index.html';
    }

    init();
  </script>
</body>
</html>
