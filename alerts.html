<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EazyTrade — Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #1f1f1f;
      --accent: #00e676; --accent-dim: #00c853; --red: #ff1744;
      --text: #f5f5f5; --muted: #888; --card-bg: #141414;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    #loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app { display: none; flex-direction: column; min-height: 100vh; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 64px; background: rgba(10,10,10,0.95); border-bottom: 1px solid var(--border); flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.02em; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }

    .layout { display: flex; flex: 1; overflow: hidden; }

    .sidebar { width: 230px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px 0; height: calc(100vh - 64px); position: sticky; top: 64px; overflow-y: auto; }
    .sidebar-section { padding: 6px 12px; font-size: 0.7rem; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 12px; }
    .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; font-size: 0.9rem; font-weight: 500; color: var(--muted); text-decoration: none; transition: background 0.15s, color 0.15s; position: relative; border: none; background: none; font-family: inherit; width: 100%; text-align: left; cursor: pointer; }
    .sidebar-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .sidebar-item.active { background: rgba(0,230,118,0.08); color: var(--accent); font-weight: 600; }
    .sidebar-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 0 2px 2px 0; }
    .sidebar-arrow { margin-left: auto; font-size: 0.75rem; color: #444; }
    .sidebar-bottom { margin-top: auto; padding: 16px 12px; border-top: 1px solid var(--border); }

    main { flex: 1; padding: 28px 36px; overflow-y: auto; }

    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }

    .alerts-table { width: 100%; border-collapse: collapse; }
    .alerts-table th { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .alerts-table td { padding: 14px 16px; font-size: 0.88rem; border-bottom: 1px solid #161616; vertical-align: middle; }
    .alerts-table tr:hover td { background: rgba(255,255,255,0.02); }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-active { background: rgba(0,230,118,0.12); color: var(--accent); }
    .badge-expired { background: rgba(255,23,68,0.1); color: var(--red); }

    .btn-delete { background: none; border: 1px solid #2a2a2a; color: var(--muted); font-size: 0.78rem; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-family: inherit; transition: border-color 0.15s, color 0.15s; }
    .btn-delete:hover { border-color: var(--red); color: var(--red); }
    .btn-edit { background: none; border: 1px solid #2a2a2a; color: var(--muted); font-size: 0.78rem; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-family: inherit; transition: border-color 0.15s, color 0.15s; margin-right: 6px; }
    .btn-edit:hover { border-color: var(--accent); color: var(--accent); }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; width: 100%; max-width: 460px; box-shadow: 0 24px 60px rgba(0,0,0,0.6); animation: modalIn 0.18s ease; }
    @keyframes modalIn { from { opacity:0; transform:scale(0.96) translateY(8px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid #2a2a2a; }
    .modal-title { font-size: 1rem; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
    .modal-close:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .modal-body { padding: 22px; display: flex; flex-direction: column; gap: 14px; }
    .field-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
    .field-group input, .field-group textarea { width: 100%; background: #111; border: 1px solid #2a2a2a; color: var(--text); font-size: 0.88rem; padding: 8px 12px; border-radius: 6px; outline: none; font-family: inherit; transition: border-color 0.2s; }
    .field-group input:focus, .field-group textarea:focus { border-color: var(--accent); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 22px; border-top: 1px solid #2a2a2a; }
    .btn-cancel { background: transparent; border: 1px solid #333; color: var(--text); font-size: 0.9rem; font-weight: 600; padding: 9px 22px; border-radius: 7px; cursor: pointer; font-family: inherit; }
    .btn-cancel:hover { background: rgba(255,255,255,0.05); }
    .btn-confirm { background: var(--accent); color: #000; font-size: 0.9rem; font-weight: 800; padding: 9px 26px; border-radius: 7px; border: none; cursor: pointer; font-family: inherit; }
    .btn-confirm:hover { background: var(--accent-dim); }
    .btn-danger { background: var(--red); color: #fff; font-size: 0.9rem; font-weight: 800; padding: 9px 26px; border-radius: 7px; border: none; cursor: pointer; font-family: inherit; }
    .btn-danger:hover { background: #d50000; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.9rem; border: 1px dashed var(--border); border-radius: 10px; margin-top: 8px; }
    .empty-state .icon { font-size: 2rem; margin-bottom: 12px; }

    @media (max-width: 900px) { .sidebar { display: none; } }
  </style>
</head>
<body>

  <div id="loading-screen"><div class="spinner"></div></div>

  <div id="app">
    <nav>
      <a href="index.html" class="logo">Eazy<span>Trade</span></a>
    </nav>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-section">Menu</div>
        <a href="dashboard.html" class="sidebar-item">Dashboard</a>
        <a href="alerts.html" class="sidebar-item active">Systems</a>
        <a href="accounts.html" class="sidebar-item">Accounts</a>
        <div class="sidebar-section">Trading</div>
        <a href="create-system.html" class="sidebar-item">Systems <span class="sidebar-arrow">›</span></a>
        <a href="#" class="sidebar-item">Trades</a>
        <a href="brokers.html" class="sidebar-item">Brokers</a>
        <div class="sidebar-bottom">
          <a href="#" class="sidebar-item" style="padding:8px 4px;">Account <span class="sidebar-arrow">›</span></a>
          <button class="sidebar-item" id="signout-btn" style="color:#ff1744;padding:8px 4px;width:100%;">Sign Out</button>
        </div>
      </aside>

      <main>
        <div class="page-header">
          <h1>Systems</h1>
        </div>

        <div id="alerts-container">
          <div class="empty-state">
            <div>No systems yet.</div>
            <a href="create-system.html" style="display:inline-block;margin-top:14px;background:var(--accent);color:#000;font-weight:800;font-size:0.85rem;padding:9px 22px;border-radius:8px;text-decoration:none;">+ Create System</a>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- DELETE CONFIRM MODAL -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal" style="max-width:380px;">
      <div class="modal-header">
        <div class="modal-title">Delete Alert</div>
        <button class="modal-close" id="delete-close">&times;</button>
      </div>
      <div class="modal-body" style="font-size:0.9rem;color:var(--muted);">
        Are you sure you want to delete this alert? This action cannot be undone.
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="delete-cancel">Cancel</button>
        <button class="btn-danger" id="delete-confirm">Delete</button>
      </div>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Edit Alert</div>
        <button class="modal-close" id="edit-close">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-id" />
        <div class="field-group"><label>Name</label><input type="text" id="edit-name" /></div>
        <div class="field-group"><label>Symbol</label><input type="text" id="edit-symbol" /></div>
        <div class="field-group"><label>Price</label><input type="number" id="edit-price" /></div>
        <div class="field-group"><label>JSON Message</label><textarea id="edit-message" rows="4" style="font-family:monospace;font-size:0.8rem;resize:vertical;"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="edit-cancel">Cancel</button>
        <button class="btn-confirm" id="edit-save">Save</button>
      </div>
    </div>
  </div>
  <script>
    const SUPABASE_URL = 'https://isanhutzyctcjygjhzbn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzYW5odXR6eWN0Y2p5Z2poemJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTYzNDYsImV4cCI6MjA5MTY5MjM0Nn0.L0ATp-IriR708C2n3as_YXDgjHvtn_CWubbzPeSxRi0';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let pendingDeleteId = null;

    function deleteAlert(id) {
      pendingDeleteId = id;
      document.getElementById('delete-modal').classList.add('open');
    }

    async function loadAlerts() {
      const { data: { session } } = await sbClient.auth.getSession();
      if (!session) return;

      const { data, error } = await sbClient
        .from('alerts')
        .select('*')
        .eq('user_id', session.user.id)
        .order('created_at', { ascending: false });

      const container = document.getElementById('alerts-container');

      if (error || !data || data.length === 0) {
        container.innerHTML = `<div class="empty-state"><div>No systems yet.</div><a href="create-system.html" style="display:inline-block;margin-top:14px;background:var(--accent);color:#000;font-weight:800;font-size:0.85rem;padding:9px 22px;border-radius:8px;text-decoration:none;">+ Create System</a></div>`;
        return;
      }

      container.innerHTML = `
        <table class="alerts-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Symbol</th>
              <th>Type</th>
              <th>Indicator</th>
              <th>Crossing</th>
              <th>Price</th>
              <th>Trigger</th>
              <th>Expiration</th>
              <th>Message</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${data.map(a => `
              <tr>
                <td style="font-weight:600;">${a.name || '—'}</td>
                <td style="color:var(--accent);font-weight:600;">${a.symbol || '—'}</td>
                <td>${a.asset_type ? `<span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:600;background:rgba(255,255,255,0.06);color:#ccc;">${a.asset_type}</span>` : '—'}</td>
                <td style="color:var(--muted);">${a.indicator || '—'}</td>
                <td>${a.crossing || '—'}</td>
                <td>${a.price != null ? a.price : '—'}</td>
                <td>${a.trigger || '—'}</td>
                <td>${a.expiration ? new Date(a.expiration).toLocaleString() : '<span class="badge badge-active">No expiry</span>'}</td>
                <td style="max-width:200px;">
                  <pre style="font-family:monospace;font-size:0.72rem;color:var(--muted);white-space:pre-wrap;word-break:break-word;margin:0;max-height:80px;overflow:hidden;">${a.message ? ((() => { try { return JSON.stringify(JSON.parse(a.message), null, 2); } catch { return a.message; } })()) : '—'}</pre>
                </td>
                <td style="white-space:nowrap;">
                  <button class="btn-edit" onclick="openEdit(${JSON.stringify(a).split('"').join('&quot;')})">Edit</button>
                  <button class="btn-delete" onclick="deleteAlert('${a.id}')">Delete</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    function openEdit(a) {
      if (typeof a === 'string') a = JSON.parse(a);
      document.getElementById('edit-id').value = a.id;
      document.getElementById('edit-name').value = a.name || '';
      document.getElementById('edit-symbol').value = a.symbol || '';
      document.getElementById('edit-price').value = a.price || '';
      document.getElementById('edit-message').value = a.message || '';
      document.getElementById('edit-modal').classList.add('open');
    }

    async function init() {
      const { data: { session } } = await sbClient.auth.getSession();
      if (!session) { window.location.href = 'signin.html'; return; }

      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';

      loadAlerts();

      document.getElementById('delete-close').addEventListener('click', () => document.getElementById('delete-modal').classList.remove('open'));
      document.getElementById('delete-cancel').addEventListener('click', () => document.getElementById('delete-modal').classList.remove('open'));
      document.getElementById('delete-confirm').addEventListener('click', async () => {
        if (!pendingDeleteId) return;
        await sbClient.from('alerts').delete().eq('id', pendingDeleteId);
        pendingDeleteId = null;
        document.getElementById('delete-modal').classList.remove('open');
        loadAlerts();
      });

      document.getElementById('edit-close').addEventListener('click', () => document.getElementById('edit-modal').classList.remove('open'));
      document.getElementById('edit-cancel').addEventListener('click', () => document.getElementById('edit-modal').classList.remove('open'));

      document.getElementById('edit-save').addEventListener('click', async () => {
        const id = document.getElementById('edit-id').value;
        const updates = {
          name: document.getElementById('edit-name').value,
          symbol: document.getElementById('edit-symbol').value,
          price: parseFloat(document.getElementById('edit-price').value) || null,
          message: document.getElementById('edit-message').value,
        };
        const { error } = await sbClient.from('alerts').update(updates).eq('id', id);
        if (error) { window.alert('Save failed: ' + error.message); return; }
        document.getElementById('edit-modal').classList.remove('open');
        loadAlerts();
      });

      document.getElementById('signout-btn').addEventListener('click', async () => {
        await sbClient.auth.signOut();
        window.location.href = 'index.html';
      });
    }

    init();
  </script>
</body>
</html>
