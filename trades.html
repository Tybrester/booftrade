<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EazyTrade — Trades</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #1f1f1f;
      --accent: #00e676; --accent-dim: #00c853; --red: #ff1744;
      --text: #f5f5f5; --muted: #888; --card-bg: #141414;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    #loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app { display: none; flex-direction: column; min-height: 100vh; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 64px; background: rgba(10,10,10,0.95); border-bottom: 1px solid var(--border); flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.02em; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }

    .layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 230px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px 0; height: calc(100vh - 64px); position: sticky; top: 64px; overflow-y: auto; }
    .sidebar-section { padding: 6px 12px; font-size: 0.7rem; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 12px; }
    .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; font-size: 0.9rem; font-weight: 500; color: var(--muted); text-decoration: none; transition: background 0.15s, color 0.15s; position: relative; border: none; background: none; font-family: inherit; width: 100%; text-align: left; cursor: pointer; }
    .sidebar-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .sidebar-item.active { background: rgba(0,230,118,0.08); color: var(--accent); font-weight: 600; }
    .sidebar-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 0 2px 2px 0; }
    .sidebar-arrow { margin-left: auto; font-size: 0.75rem; color: #444; }
    .sidebar-bottom { margin-top: auto; padding: 16px 12px; border-top: 1px solid var(--border); }

    main { flex: 1; padding: 28px 36px; overflow-y: auto; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }

    .section-title { font-size: 0.72rem; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin: 0 0 12px; }

    .trades-table { width: 100%; border-collapse: collapse; }
    .trades-table th { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .trades-table td { padding: 14px 16px; font-size: 0.88rem; border-bottom: 1px solid #161616; vertical-align: middle; }
    .trades-table tr:hover td { background: rgba(255,255,255,0.02); }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-long { background: rgba(0,230,118,0.12); color: var(--accent); }
    .badge-short { background: rgba(255,23,68,0.1); color: var(--red); }
    .pnl-pos { color: var(--accent); font-weight: 700; }
    .pnl-neg { color: var(--red); font-weight: 700; }

    .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 0.9rem; border: 1px dashed var(--border); border-radius: 12px; }

    .btn-close-trade { background: none; border: 1px solid #2a2a2a; color: var(--muted); font-size: 0.78rem; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-family: inherit; transition: border-color 0.15s, color 0.15s; }
    .btn-close-trade:hover { border-color: var(--red); color: var(--red); }

    /* TP/SL dropdown styling */
    select option { background: #1a1a1a; color: var(--text); }
    select option:hover { background: #2a2a2a; }

    @media (max-width: 900px) { .sidebar { display: none; } }
  </style>
</head>
<body>
  <div id="loading-screen"><div class="spinner"></div></div>

  <div id="app">
    <nav>
      <a href="dashboard.html" class="logo">Boof<span style="color:var(--accent);">Trade</span></a>
    </nav>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-section">Menu</div>
        <a href="dashboard.html" class="sidebar-item">Dashboard</a>

      <main>
        <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;gap:0;border-bottom:1px solid #1f1f1f;padding-bottom:12px;margin-bottom:0;">
          <button class="tab-btn active" id="tab-trades" onclick="switchTab('trades')" style="background:none;border:none;border-bottom:2px solid var(--accent);color:var(--text);font-size:1rem;font-weight:700;padding:14px 24px 12px;cursor:pointer;font-family:inherit;">Trades</button>
          <div class="user-dropdown" id="user-dropdown">
            <button class="user-dropdown-toggle" id="user-email-toggle" style="display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:0.85rem;color:var(--muted);cursor:pointer;">
              <span id="user-email"></span>
              <span style="color:var(--accent);font-size:0.7rem;">▾</span>
            </button>
            <div class="user-dropdown-menu" style="position:absolute;top:calc(100% + 8px);right:0;min-width:180px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 0;box-shadow:0 10px 30px rgba(0,0,0,0.4);opacity:0;visibility:hidden;transform:translateY(-8px);transition:all 0.2s;z-index:100;">
              <button class="user-dropdown-item" onclick="signOut()" style="display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:0.85rem;color:var(--red);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;">
                <span>🚪</span> Sign Out
              </button>
            </div>
          </div>
        </div>

        <!-- TRADES TAB -->
        <div id="tab-content-trades" style="margin-top:24px;">
          <div style="margin-bottom:20px;max-width:320px;">
            <select id="trades-system-filter" onchange="loadTrades()" style="width:100%;background:#111;border:1px solid #2a2a2a;color:var(--text);padding:9px 12px;border-radius:8px;font-family:inherit;font-size:0.85rem;outline:none;">
              <option value="">All Systems</option>
            </select>
          </div>
          <div class="section-title" style="color:#ffc107;">Pending Positions</div>
          <div id="pending-positions-container">
            <div class="empty-state" style="padding:20px 24px;">No pending positions.</div>
          </div>

          <div class="section-title" style="margin-top:28px;">Open Positions</div>
          <div id="open-positions-container">
            <div class="empty-state">No open positions yet.</div>
          </div>

          <div class="section-title" style="margin-top:32px;">Closed Trades</div>
          <div id="closed-trades-container">

          </div>

          <div class="section-title" style="margin-top:32px;color:var(--red);">Failed Trades</div>
          <div id="failed-trades-container">
            <div class="empty-state">No failed trades.</div>
          </div>
        </div>


        <div style="text-align:center;padding:24px;font-size:0.85rem;color:#666;margin-top:auto;">
          Contact: <a href="mailto:booftrade@gmail.com" style="color:var(--muted);text-decoration:none;">booftrade@gmail.com</a>
        </div>
      </main>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://isanhutzyctcjygjhzbn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzYW5odXR6eWN0Y2p5Z2poemJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTYzNDYsImV4cCI6MjA5MTY5MjM0Nn0.L0ATp-IriR708C2n3as_YXDgjHvtn_CWubbzPeSxRi0';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function detectAssetType(symbol, payload) {
      if (payload?.assetType) return payload.assetType;
      if (payload?.asset_type) return payload.asset_type;
      if (!symbol) return 'Stock';
      const s = symbol.toUpperCase();
      // Futures: end with ! or =F
      if (s.endsWith('!') || s.endsWith('=F') || /^(CL|ES|NQ|GC|SI|NG|ZB|ZN|YM|RTY|MES|MNQ|MCL|MGC)/.test(s)) return 'Future';
      // Crypto: ends with USDT, USD, BTC, ETH pairings
      if (s.endsWith('USDT') || s.endsWith('-USD') || s.endsWith('BTC') || s.endsWith('ETH')) return 'Crypto';
      // Options: long symbol with numbers and C/P (e.g. AAPL240419C00150000)
      if (/^[A-Z]{1,5}\d{6}[CP]\d+$/.test(s)) return 'Option';
      return 'Stock';
    }

    function normalizeSymbol(symbol) {
      if (!symbol) return symbol;
      let s = symbol.includes(':') ? symbol.split(':')[1] : symbol;
      // TradingView futures use ! suffix — map to Yahoo Finance equivalents
      const futuresMap = {
        'CL1!': 'CL=F', 'ES1!': 'ES=F', 'NQ1!': 'NQ=F', 'GC1!': 'GC=F',
        'SI1!': 'SI=F', 'NG1!': 'NG=F', 'ZB1!': 'ZB=F', 'ZN1!': 'ZN=F',
        'YM1!': 'YM=F', 'RTY1!': 'RTY=F', 'MES1!': 'MES=F', 'MNQ1!': 'MNQ=F',
      };
      if (futuresMap[s]) return futuresMap[s];
      if (s.endsWith('!')) s = s.replace('!', '=F');
      if (s.endsWith('USDT')) s = s.replace('USDT', '-USD');
      return s;
    }

    const priceCache = {};
    async function fetchPrice(symbol, forceRefresh = false) {
      if (!symbol) return null;
      const normalizedSymbol = normalizeSymbol(symbol);
      const cached = priceCache[normalizedSymbol];
      if (!forceRefresh && cached && Date.now() - cached.ts < 30000 && cached.price !== null) return cached.price;
      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/get-price?symbol=${encodeURIComponent(normalizedSymbol)}${forceRefresh ? '&nocache=true' : ''}`, {
          headers: { 'apikey': SUPABASE_ANON_KEY }
        });
        const json = await res.json();
        console.log('[fetchPrice]', normalizedSymbol, json);
        const price = json.price || null;
        if (price) priceCache[normalizedSymbol] = { price, ts: Date.now() };
        return price;
      } catch(e) { console.error('[fetchPrice error]', e); return null; }
    }

    async function closeTrade(id, symbol, direction, entryPrice, quantity, broker, auto = false) {
      // Show confirmation modal first (unless auto-closing)
      if (!auto) {
        const overlay = document.createElement('div');
        overlay.id = 'close-modal';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9999;';
        
        const modal = document.createElement('div');
        modal.style.cssText = 'background:var(--surface);border-radius:12px;padding:28px 32px;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);';
        
        modal.innerHTML = `
          <div style="font-size:2rem;margin-bottom:12px;">⚠️</div>
          <div style="font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:12px;">Close Trade?</div>
          <div style="font-size:0.9rem;color:var(--muted);line-height:1.5;margin-bottom:24px;">This will close your ${symbol || 'trade'} position.<br>Proceed?</div>
          <div style="display:flex;gap:12px;justify-content:center;">
            <button id="close-cancel" style="background:transparent;border:1px solid #555;color:#888;font-weight:600;padding:10px 20px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.85rem;">Cancel</button>
            <button id="close-confirm" style="background:var(--red);color:#fff;font-weight:700;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:0.85rem;">Close Position</button>
          </div>
        `;
        
        overlay.appendChild(modal);
        document.body.appendChild(overlay);
        
        document.getElementById('close-cancel').addEventListener('click', () => overlay.remove());
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
        
        document.getElementById('close-confirm').addEventListener('click', async () => {
          overlay.remove();
          await executeClose(id, symbol, direction, entryPrice, quantity, broker);
        });
        return;
      }
      
      // Auto-close without confirmation
      await executeClose(id, symbol, direction, entryPrice, quantity, broker);
    }

    async function executeClose(id, symbol, direction, entryPrice, quantity, broker) {
        
        let exitPrice = null;
        try {
          exitPrice = await fetchPrice(symbol);
        } catch(e) {}

        // Futures and options multipliers
        const contractMultipliers = {
          // Futures ($ per point)
          'ES=F': 50, 'MES=F': 5, 'NQ=F': 20, 'MNQ=F': 2,
          'CL=F': 1000, 'MCL=F': 100, 'GC=F': 100, 'MGC=F': 10,
          'SI=F': 5000, 'SIL=F': 1000, 'NG=F': 10000,
          'ZB=F': 1000, 'ZN=F': 1000, 'YM=F': 5, 'MYM=F': 0.5,
          'RTY=F': 50, 'M2K=F': 5,
        };
        const normalizedSymbol = normalizeSymbol(symbol);
        // Check if options by symbol pattern (contains date and C/P)
        const isOption = /\d{6}[CP]\d+$/.test(symbol);
        const multiplier = isOption ? 100 : (contractMultipliers[normalizedSymbol] || 1);
        const pointDiff = exitPrice ? (direction === 'Long' ? (exitPrice - entryPrice) : (entryPrice - exitPrice)) : 0;
        const pnl = pointDiff * multiplier * quantity;

        await sbClient.from('trades').update({
          status: 'closed',
          closed_at: new Date().toISOString(),
          pnl: pnl,
        }).eq('id', id);

        if (broker === 'EasyTrade Paper') {
          const currentBalance = parseFloat(localStorage.getItem('paper_balance') || '100000');
          const newBalance = Math.max(0, currentBalance + pnl);
          localStorage.setItem('paper_balance', String(newBalance));
          const { data: { session } } = await sbClient.auth.getSession();
          if (session) {
            await sbClient.auth.updateUser({ data: { paper_balance: newBalance } });
          }
        }

        loadTrades();
    }

    async function rejectTrade(id) {
      await sbClient.from('trades').delete().eq('id', id);
      loadTrades();
    }

    function showTradeError(message) {
      // Create modal overlay
      const overlay = document.createElement('div');
      overlay.id = 'trade-error-modal';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9999;';
      
      const modal = document.createElement('div');
      modal.style.cssText = 'background:var(--surface);border-radius:12px;padding:28px 32px;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);';
      
      modal.innerHTML = `
        <div style="font-size:2.5rem;margin-bottom:12px;">⚠️</div>
        <div style="font-size:1.1rem;font-weight:700;color:var(--red);margin-bottom:12px;">Insufficient Funds</div>
        <div style="font-size:0.9rem;color:var(--text);line-height:1.5;margin-bottom:20px;">${message}</div>
        <button onclick="this.closest('#trade-error-modal').remove()" style="background:var(--red);color:#fff;font-weight:700;padding:10px 28px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:0.9rem;">OK</button>
      `;
      
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
      
      // Close on overlay click
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.remove();
      });
    }

    async function fillTrade(id, action, price, quantity) {
      const cost = price * quantity;
      const { data: { session } } = await sbClient.auth.getSession();
      if (!session) return;

      // Get current balance
      const { data: acct } = await sbClient.from('paper_accounts').select('*').eq('user_id', session.user.id).maybeSingle();
      const currentBalance = acct?.balance ?? 100000;
      
      // Safety check: prevent fills that would cause negative balance
      if (action === 'buy' && cost > currentBalance) {
        showTradeError(`Insufficient funds. Trade cost ($${cost.toLocaleString()}) exceeds balance ($${currentBalance.toLocaleString()}). Adjust quantity or add more funds.`);
        return;
      }

      // Update paper balance
      if (acct) {
        const newBalance = action === 'buy' ? acct.balance - cost : acct.balance + cost;
        await sbClient.from('paper_accounts').update({ balance: newBalance, updated_at: new Date().toISOString() }).eq('user_id', session.user.id);
      } else {
        await sbClient.from('paper_accounts').insert({ user_id: session.user.id, balance: action === 'buy' ? 100000 - cost : 100000 + cost });
      }

      await sbClient.from('trades').update({ status: 'filled', price }).eq('id', id);
      loadTrades();
    }

    async function updateTPSL(id, field, value, type, entryPrice, direction = 'Long') {
      const statusEl = document.getElementById(`${field === 'take_profit' ? 'tp' : 'sl'}-status-${id}`);
      if (statusEl) statusEl.textContent = 'Saving...';
      
      const numValue = parseFloat(value);
      if (isNaN(numValue)) {
        // Clear TP/SL
        const updateData = field === 'take_profit' 
          ? { take_profit: null, take_profit_type: null, take_profit_input: null, take_profit_pnl: null }
          : { stop_loss: null, stop_loss_type: null, stop_loss_input: null, stop_loss_pnl: null };
        await sbClient.from('trades').update(updateData).eq('id', id);
        if (statusEl) statusEl.textContent = 'Cleared';
        setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 2000);
        return;
      }

      // Get trade data for symbol/quantity
      const { data: trade } = await sbClient.from('trades').select('*').eq('id', id).single();
      if (!trade) {
        if (statusEl) {
          statusEl.textContent = 'Trade not found!';
          statusEl.style.color = 'var(--red)';
        }
        return;
      }

      // Calculate actual price based on type and direction
      let actualPrice = numValue;
      let targetPnl = null; // Store P&L target for P&L-based TP/SL
      
      if (type === 'pnl') {
        // P&L-based: calculate price from desired P&L
        // Example: entry $100, want to close at P&L -$100 (from -$200), quantity 1
        // Target P&L = -100 means we want to lose $100, so price needs to move
        targetPnl = numValue;
        const isLong = direction === 'Long';
        
        // For futures, we need the multiplier
        const normalizedSymbol = normalizeSymbol(trade.symbol);
        const isOption = /\d{6}[CP]\d+$/.test(trade.symbol);
        const contractMultipliers = {
          'ES=F': 50, 'MES=F': 5, 'NQ=F': 20, 'MNQ=F': 2,
          'CL=F': 1000, 'MCL=F': 100, 'GC=F': 100, 'MGC=F': 10,
          'SI=F': 5000, 'SIL=F': 1000, 'NG=F': 10000,
          'ZB=F': 1000, 'ZN=F': 1000, 'YM=F': 5, 'MYM=F': 0.5,
          'RTY=F': 50, 'M2K=F': 5,
        };
        const multiplier = isOption ? 100 : (contractMultipliers[normalizedSymbol] || 1);
        
        // Calculate price change needed: P&L = (currentPrice - entryPrice) * multiplier * qty
        // So: currentPrice = entryPrice + (P&L / (multiplier * qty))
        const qty = trade.quantity || 1;
        const priceChange = targetPnl / (multiplier * qty);
        actualPrice = entryPrice + priceChange;
        
      } else if (type === 'percent') {
        // Convert percentage to price
        const pct = numValue / 100;
        const isLong = direction === 'Long';
        if (field === 'take_profit') {
          // TP: Long=above entry, Short=below entry
          actualPrice = isLong ? entryPrice * (1 + pct) : entryPrice * (1 - pct);
        } else {
          // SL: Long=below entry, Short=above entry
          actualPrice = isLong ? entryPrice * (1 - pct) : entryPrice * (1 + pct);
        }
      }
      
      // Ensure price is positive for price-based calculations
      if (type !== 'pnl' && actualPrice <= 0) {
        if (statusEl) {
          statusEl.textContent = 'Invalid price!';
          statusEl.style.color = 'var(--red)';
        }
        return;
      }

      const updateData = field === 'take_profit' 
        ? { take_profit: actualPrice, take_profit_type: type, take_profit_input: numValue, take_profit_pnl: targetPnl }
        : { stop_loss: actualPrice, stop_loss_type: type, stop_loss_input: numValue, stop_loss_pnl: targetPnl };
      
      const { error } = await sbClient.from('trades').update(updateData).eq('id', id);
      if (error) {
        console.error('Failed to update TP/SL:', error);
        if (statusEl) {
          statusEl.textContent = 'Error!';
          statusEl.style.color = 'var(--red)';
        }
      } else {
        if (statusEl) {
          statusEl.textContent = '✓ Saved';
          statusEl.style.color = 'var(--accent)';
          setTimeout(() => {
            if (statusEl) {
              statusEl.textContent = `At: $${actualPrice.toFixed(2)}`;
              statusEl.style.color = 'var(--muted)';
            }
          }, 2000);
        }
      }
    }

    async function retryTrade(id) {
      const { data: { session } } = await sbClient.auth.getSession();
      if (!session) return;
      
      // Get trade details
      const { data: trade } = await sbClient.from('trades').select('*').eq('id', id).single();
      if (!trade) return;
      
      // Try to fill it again
      const cost = trade.price * trade.quantity;
      const { data: acct } = await sbClient.from('paper_accounts').select('*').eq('user_id', session.user.id).maybeSingle();
      const currentBalance = acct?.balance ?? 100000;
      
      if (trade.action === 'buy' && cost > currentBalance) {
        showTradeError(`Still insufficient funds. Trade cost ($${cost.toLocaleString()}) exceeds balance ($${currentBalance.toLocaleString()})`);
        return;
      }
      
      // Update balance
      if (acct) {
        const newBalance = trade.action === 'buy' ? acct.balance - cost : acct.balance + cost;
        await sbClient.from('paper_accounts').update({ balance: newBalance, updated_at: new Date().toISOString() }).eq('user_id', session.user.id);
      }
      
      // Mark as filled
      await sbClient.from('trades').update({ status: 'filled', failure_reason: null }).eq('id', id);
      loadTrades();
    }

    async function loadSystemsFilter() {
      const { data: { session } } = await sbClient.auth.getSession();
      if (!session) return;
      const sel = document.getElementById('trades-system-filter');
      if (sel.options.length > 1) return;
      const { data } = await sbClient.from('systems').select('id,name').eq('user_id', session.user.id);
      (data || []).forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id; opt.textContent = s.name;
        sel.appendChild(opt);
      });
    }

    async function loadTrades() {
      const { data: { session } } = await sbClient.auth.getSession();
      if (!session) return;

      const systemId = document.getElementById('trades-system-filter')?.value || '';
      let query = sbClient.from('trades').select('*').eq('user_id', session.user.id).order('created_at', { ascending: false });
      if (systemId) query = query.eq('system_id', systemId);
      const { data: trades } = await query;

      const pending = (trades || []).filter(t => t.status === 'open');
      const open    = (trades || []).filter(t => t.status === 'filled');
      const failed  = (trades || []).filter(t => t.status === 'failed');
      const closed  = (trades || []).filter(t => t.status === 'closed');

      const pendingEl = document.getElementById('pending-positions-container');
      const openEl    = document.getElementById('open-positions-container');
      const failedEl  = document.getElementById('failed-trades-container');
      const closedEl  = document.getElementById('closed-trades-container');

      // PENDING
      if (pending.length === 0) {
        pendingEl.innerHTML = '<div class="empty-state" style="padding:20px 24px;">No pending positions.</div>';
      } else {
        const rows = await Promise.all(pending.map(async t => {
          const entryPrice = t.entry_price ?? t.price;
          const direction  = t.direction || (t.action === 'buy' ? 'Long' : 'Short');
          const currentPrice = await fetchPrice(t.symbol);
          return `<tr>
            <td style="color:var(--text);font-weight:600;">${t.symbol || '—'} <span class="badge" style="font-size:0.68rem;background:rgba(255,193,7,0.12);color:#ffc107;">Pending</span></td>
            <td><span class="badge ${direction === 'Long' ? 'badge-long' : 'badge-short'}">${direction}</span></td>
            <td style="color:var(--muted);font-size:0.78rem;text-transform:uppercase;letter-spacing:0.05em;">${detectAssetType(t.symbol, t.payload)}</td>
            <td>${t.quantity || '—'}</td>
            <td>${currentPrice ? '$'+currentPrice.toFixed(2) : (entryPrice ? '$'+Number(entryPrice).toFixed(2) : '—')}</td>
            <td>${(currentPrice && t.quantity) ? '$'+(currentPrice * t.quantity).toFixed(2) : '—'}</td>
            <td style="color:var(--muted);font-size:0.8rem;">${t.broker || 'paper'}</td>
            <td style="display:flex;gap:6px;">
              <button class="btn-close-trade" style="border-color:var(--accent);color:var(--accent);" onclick="fillTrade('${t.id}','${t.action||'buy'}',${currentPrice||entryPrice||0},${t.quantity||1})">Fill</button>
              <button class="btn-close-trade" onclick="rejectTrade('${t.id}')">Reject</button>
            </td>
          </tr>`;
        }));
        pendingEl.innerHTML = `<table class="trades-table">
          <thead><tr>
            <th>Symbol</th><th>Side</th><th>Type</th><th>Qty</th>
            <th>Market Price</th><th>Est. Cost</th><th>Broker</th><th></th>
          </tr></thead>
          <tbody>${rows.join('')}</tbody>
        </table>`;
      }

      // Futures and options multipliers - must match dashboard
      const contractMultipliers = {
        // Futures ($ per point)
        'ES=F': 50, 'MES=F': 5, 'NQ=F': 20, 'MNQ=F': 2,
        'CL=F': 1000, 'MCL=F': 100, 'GC=F': 100, 'MGC=F': 10,
        'SI=F': 5000, 'SIL=F': 1000, 'NG=F': 10000,
        'ZB=F': 1000, 'ZN=F': 1000, 'YM=F': 5, 'MYM=F': 0.5,
        'RTY=F': 50, 'M2K=F': 5,
        // Options (100 shares per contract)
        'OPTION': 100,
      };

      if (open.length === 0) {
        openEl.innerHTML = '<div class="empty-state">No open positions yet.</div>';
      } else {
        const rows = await Promise.all(open.map(async t => {
          // support both old schema (entry_price/direction) and new (price/action)
          const entryPrice = t.entry_price ?? t.price;
          const direction  = t.direction || (t.action === 'buy' ? 'Long' : 'Short');
          const currentPrice = await fetchPrice(t.symbol);
          let pnlHtml = '—';
          if (currentPrice && entryPrice && t.quantity) {
            const normalizedSymbol = normalizeSymbol(t.symbol);
            const pointDiff = direction === 'Long'
              ? (currentPrice - entryPrice)
              : (entryPrice - currentPrice);
            // Check if options by symbol pattern (contains date and C/P)
            const isOption = /\d{6}[CP]\d+$/.test(t.symbol);
            const multiplier = isOption ? 100 : (contractMultipliers[normalizedSymbol] || 1);
            const diff = pointDiff * multiplier * t.quantity;
            const entryCost = entryPrice * multiplier * t.quantity;
            const pct = entryCost > 0 ? ((diff / entryCost) * 100).toFixed(2) : '0.00';
            pnlHtml = `<span class="${diff >= 0 ? 'pnl-pos' : 'pnl-neg'}">${diff >= 0 ? '+' : ''}$${diff.toFixed(2)} (${diff >= 0 ? '+' : ''}${pct}%)</span>`;

                  <option value="price" ${t.take_profit_type !== 'percent' && t.take_profit_type !== 'pnl' ? 'selected' : ''}>$</option>
                  <option value="percent" ${t.take_profit_type === 'percent' ? 'selected' : ''}>%</option>
                  <option value="pnl" ${t.take_profit_type === 'pnl' ? 'selected' : ''}>P&L</option>
                </select>
              </div>
              <div id="tp-status-${t.id}" style="font-size:0.65rem;color:var(--muted);margin-top:2px;height:14px;"></div>
            </td>
            <td>
              <div style="display:flex;gap:6px;align-items:center;">
                <input type="number" step="0.01" id="sl-${t.id}" placeholder="SL" value="${t.stop_loss_input || t.stop_loss || ''}" onkeydown="if(event.key==='Enter'){updateTPSL('${t.id}','stop_loss',this.value,document.getElementById('sl-type-${t.id}').value,${entryPrice},'${direction}');this.style.borderColor='var(--red)';setTimeout(()=>this.style.borderColor='#333',1000);}" style="width:100px;background:#1a1a1a;border:2px solid #333;color:var(--text);padding:8px 10px;border-radius:6px;font-size:0.85rem;font-weight:600;outline:none;transition:border-color 0.2s;">
                <select id="sl-type-${t.id}" onchange="updateTPSL('${t.id}', 'stop_loss', document.getElementById('sl-${t.id}').value, this.value, ${entryPrice}, '${direction}')" style="background:#1a1a1a;border:2px solid #333;color:var(--text);padding:8px;border-radius:6px;font-size:0.8rem;width:50px;cursor:pointer;">
                  <option value="price" ${t.stop_loss_type !== 'percent' && t.stop_loss_type !== 'pnl' ? 'selected' : ''}>$</option>
                  <option value="percent" ${t.stop_loss_type === 'percent' ? 'selected' : ''}>%</option>
                  <option value="pnl" ${t.stop_loss_type === 'pnl' ? 'selected' : ''}>P&L</option>
                </select>
              </div>
              <div id="sl-status-${t.id}" style="font-size:0.65rem;color:var(--muted);margin-top:2px;height:14px;"></div>
            </td>
            <td style="color:var(--muted);font-size:0.8rem;">${t.broker || 'paper'}</td>
            <td style="color:var(--muted);font-size:0.78rem;">${filledAt}</td>
            <td style="display:flex;gap:6px;">
              ${!isFilled ? `<button class="btn-close-trade" style="border-color:var(--accent);color:var(--accent);" onclick="fillTrade('${t.id}','${t.action||'buy'}',${currentPrice||entryPrice||0},${t.quantity||1})">Fill</button>` : ''}
              <button class="btn-close-trade" onclick="closeTrade('${t.id}','${(t.symbol || '').replace(/'/g, "\\'")}','${direction}',${entryPrice||0},${t.quantity||1},'${(t.broker || 'paper').replace(/'/g, "\\'")}')">Close</button>
            </td>
          </tr>`;
        }));
        openEl.innerHTML = `<table class="trades-table">
          <thead><tr>
            <th>Symbol</th><th>Side</th><th>Type</th><th>Qty</th>
            <th>Entry</th><th>Current</th><th>P&L</th><th>Take Profit</th><th>Stop Loss</th><th>Broker</th><th>Time Filled</th><th></th>
          </tr></thead>
          <tbody>${rows.join('')}</tbody>
        </table>`;
      }

      if (closed.length === 0) {
        closedEl.innerHTML = '<div class="empty-state">No closed trades yet.</div>';
      } else {
        const rows = closed.map(t => {
          const entryPrice = t.entry_price ?? t.price;
          const direction  = t.direction || (t.action === 'buy' ? 'Long' : 'Short');
          const pnl = t.pnl;
          const entryCost = entryPrice * (t.quantity || 1);
          const pct = entryCost > 0 && pnl != null ? ((pnl / entryCost) * 100).toFixed(2) : '0.00';
          const pnlHtml = pnl != null
            ? `<span class="${pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${pnl >= 0 ? '+' : ''}$${Number(pnl).toFixed(2)} (${pnl >= 0 ? '+' : ''}${pct}%)</span>`
            : '—';
          return `<tr>
            <td style="color:var(--text);font-weight:600;">${t.symbol || '—'}</td>
            <td><span class="badge ${direction === 'Long' ? 'badge-long' : 'badge-short'}">${direction}</span></td>
            <td>${t.quantity || '—'}</td>
            <td>${entryPrice ? '$'+Number(entryPrice).toFixed(2) : '—'}</td>
            <td>${pnlHtml}</td>
            <td style="color:var(--muted);font-size:0.8rem;">${t.broker || 'paper'}</td>
            <td style="color:var(--muted);font-size:0.78rem;">${t.closed_at ? new Date(t.closed_at).toLocaleDateString() : '—'}</td>
          </tr>`;
        });
        closedEl.innerHTML = `<table class="trades-table">
          <thead><tr>
            <th>Symbol</th><th>Side</th><th>Qty</th>
            <th>Entry</th><th>P&L</th><th>Broker</th><th>Closed</th>
          </tr></thead>
          <tbody>${rows.join('')}</tbody>
        </table>`;
      }

      // FAILED TRADES
      if (failed.length === 0) {
        failedEl.innerHTML = '<div class="empty-state">No failed trades.</div>';
      } else {
        const rows = failed.map(t => {
          const entryPrice = t.entry_price ?? t.price;
          const direction  = t.direction || (t.action === 'buy' ? 'Long' : 'Short');
          return `<tr>
            <td style="color:var(--text);font-weight:600;">${t.symbol || '—'}</td>
            <td><span class="badge ${direction === 'Long' ? 'badge-long' : 'badge-short'}">${direction}</span></td>
            <td>${t.quantity || '—'}</td>
            <td>${entryPrice ? '$'+Number(entryPrice).toFixed(2) : '—'}</td>
            <td style="color:var(--red);font-size:0.85rem;">${t.failure_reason || 'Insufficient balance'}</td>
            <td><button class="btn-icon" onclick="retryTrade('${t.id}')" title="Retry">↻</button></td>
          </tr>`;
        });
        failedEl.innerHTML = `<table class="trades-table">
          <thead><tr>
            <th>Symbol</th><th>Side</th><th>Qty</th>
            <th>Entry</th><th>Reason</th><th></th>
          </tr></thead>
          <tbody>${rows.join('')}</tbody>
        </table>`;
      }
    }

    function buildJSONPreview() {
      const action    = document.getElementById('json-action')?.value || 'buy';
      const symbolRaw = document.getElementById('json-symbol')?.value.trim();
      const symbol    = symbolRaw || '{{ticker}}';
      const qty       = parseFloat(document.getElementById('json-qty')?.value) || 1;
      const orderType = document.getElementById('json-order-type')?.value || 'market';
      const broker    = document.getElementById('json-broker')?.value || 'paper';
      const priceRaw  = document.getElementById('json-price')?.value.trim();
      const price     = priceRaw || '{{close}}';

      // Update webhook URL display
      const systemSel = document.getElementById('json-system');
      const webhookEl = document.getElementById('json-webhook-url');
      const selectedOpt = systemSel?.options[systemSel.selectedIndex];
      const webhookUrl = selectedOpt?.dataset?.url || '';
      if (webhookUrl) {
        webhookEl.textContent = '🔗 ' + webhookUrl;
        webhookEl.style.display = 'block';
      } else {
        webhookEl.style.display = 'none';
      }

      const payload = {
        action,
        symbol,
        quantity: qty,
        order_type: orderType,
        broker,
        price,
        time: '{{time}}'
      };

      if (currentAssetType === 'options') {
        payload.contract = document.getElementById('json-contract')?.value || 'call';
        const strike = document.getElementById('json-strike')?.value;
        const expiry = document.getElementById('json-expiry')?.value;
        if (strike) payload.strike = parseFloat(strike);
        if (expiry) payload.expiry = expiry;
      } else if (currentAssetType === 'futures') {
        payload.direction = document.getElementById('json-direction')?.value || 'Long';
      } else if (currentAssetType === 'crypto') {
        payload.exchange = '{{exchange}}';
      }

      document.getElementById('json-preview').textContent = JSON.stringify(payload, null, 2);

      // Update options chain link
      const chainLink = document.getElementById('options-chain-link');
      if (chainLink) {
        const sym = symbolRaw && !symbolRaw.includes('{{') ? symbolRaw.toUpperCase() : 'AAPL';
        chainLink.href = `https://finance.yahoo.com/quote/${sym}/options/`;
        chainLink.textContent = `View ${sym} Chain ↗`;
      }
    }

      const { data: { session } } = await sbClient.auth.getSession();
      if (!session) { window.location.href = 'signin.html'; return; }

      document.getElementById('user-email').textContent = session.user.email || 'User';

    async function checkTPSLLevels() {
      const { data: { session } } = await sbClient.auth.getSession();
      if (!session) return;
      
      // Get open trades with TP or SL set
      const { data: trades } = await sbClient.from('trades')
        .select('*')
        .eq('user_id', session.user.id)
        .eq('status', 'filled')
        .or('take_profit.not.is.null,stop_loss.not.is.null');
      
      if (!trades || trades.length === 0) return;
      
      for (const trade of trades) {
        const currentPrice = await fetchPrice(trade.symbol);
        if (!currentPrice) continue;
        
        const entryPrice = trade.price;
        const direction = trade.action === 'buy' ? 'Long' : 'Short';
        let triggered = false;
        let reason = '';
        
        // Convert to numbers (Supabase returns NUMERIC as strings)
        const tpPrice = parseFloat(trade.take_profit);
        const slPrice = parseFloat(trade.stop_loss);
        const tpPnl = parseFloat(trade.take_profit_pnl);
        const slPnl = parseFloat(trade.stop_loss_pnl);
        const tpType = trade.take_profit_type;
        const slType = trade.stop_loss_type;
        
        // Calculate current P&L for comparison
        const normalizedSymbol = normalizeSymbol(trade.symbol);
        const isOption = /\d{6}[CP]\d+$/.test(trade.symbol);
        const contractMultipliers = {
          'ES=F': 50, 'MES=F': 5, 'NQ=F': 20, 'MNQ=F': 2,
          'CL=F': 1000, 'MCL=F': 100, 'GC=F': 100, 'MGC=F': 10,
          'SI=F': 5000, 'SIL=F': 1000, 'NG=F': 10000,
          'ZB=F': 1000, 'ZN=F': 1000, 'YM=F': 5, 'MYM=F': 0.5,
          'RTY=F': 50, 'M2K=F': 5,
        };
        const multiplier = isOption ? 100 : (contractMultipliers[normalizedSymbol] || 1);
        const pointDiff = direction === 'Long' ? (currentPrice - entryPrice) : (entryPrice - currentPrice);
        const currentPnl = pointDiff * multiplier * (trade.quantity || 1);
        
        console.log(`[TP/SL Check] ${trade.symbol} | ${direction} | Current: $${currentPrice} | Current P&L: $${currentPnl.toFixed(2)} | TP Price: $${tpPrice} | SL Price: $${slPrice} | TP P&L: $${tpPnl} | SL P&L: $${slPnl}`);
        
        // Check Take Profit - price-based or P&L-based
        if (!isNaN(tpPrice)) {
          if (tpType === 'pnl' && !isNaN(tpPnl)) {
            // P&L-based TP
            if (direction === 'Long' && currentPnl >= tpPnl) {
              triggered = true;
              reason = 'Take Profit hit (P&L)';
              console.log(`[TP/SL] Long TP triggered by P&L: ${currentPnl.toFixed(2)} >= ${tpPnl}`);
            } else if (direction === 'Short' && currentPnl >= tpPnl) {
              triggered = true;
              reason = 'Take Profit hit (P&L)';
              console.log(`[TP/SL] Short TP triggered by P&L: ${currentPnl.toFixed(2)} >= ${tpPnl}`);
            }
          } else {
            // Price-based TP
            if (direction === 'Long' && currentPrice >= tpPrice) {
              triggered = true;
              reason = 'Take Profit hit';
              console.log(`[TP/SL] Long TP triggered: ${currentPrice} >= ${tpPrice}`);
            } else if (direction === 'Short' && currentPrice <= tpPrice) {
              triggered = true;
              reason = 'Take Profit hit';
              console.log(`[TP/SL] Short TP triggered: ${currentPrice} <= ${tpPrice}`);
            }
          }
        }
        
        // Check Stop Loss - price-based or P&L-based
        if (!triggered && !isNaN(slPrice)) {
          if (slType === 'pnl' && !isNaN(slPnl)) {
            // P&L-based SL (for SL, target is usually negative, so check if P&L <= target)
            if (direction === 'Long' && currentPnl <= slPnl) {
              triggered = true;
              reason = 'Stop Loss hit (P&L)';
              console.log(`[TP/SL] Long SL triggered by P&L: ${currentPnl.toFixed(2)} <= ${slPnl}`);
            } else if (direction === 'Short' && currentPnl <= slPnl) {
              triggered = true;
              reason = 'Stop Loss hit (P&L)';
              console.log(`[TP/SL] Short SL triggered by P&L: ${currentPnl.toFixed(2)} <= ${slPnl}`);
            }
          } else {
            // Price-based SL
            if (direction === 'Long' && currentPrice <= slPrice) {
              triggered = true;
              reason = 'Stop Loss hit';
              console.log(`[TP/SL] Long SL triggered: ${currentPrice} <= ${slPrice}`);
            } else if (direction === 'Short' && currentPrice >= slPrice) {
              triggered = true;
              reason = 'Stop Loss hit';
              console.log(`[TP/SL] Short SL triggered: ${currentPrice} >= ${slPrice}`);
            }
          }
        }
        
        if (triggered) {
          // Auto-close the trade (skip confirmation)
          await closeTrade(trade.id, trade.symbol, direction, entryPrice, trade.quantity, trade.broker || 'paper', true);
          
          // Show toast notification centered
          const toast = document.createElement('div');
          toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:16px 24px;border-radius:8px;z-index:10000;box-shadow:0 4px 20px rgba(0,0,0,0.5);max-width:300px;';
          toast.innerHTML = `
            <div style="font-weight:700;color:var(--accent);margin-bottom:4px;">Trade Closed</div>
            <div style="font-size:0.85rem;">${trade.symbol} - ${reason}</div>
            <div style="font-size:0.8rem;color:var(--muted);margin-top:4px;">Price: $${currentPrice.toFixed(2)}</div>
          `;
          document.body.appendChild(toast);
          setTimeout(() => toast.remove(), 5000);
        }
      }
    }

    async function signOut() {
      await sbClient.auth.signOut();
      window.location.href = 'index.html';
    }

    init();
  </script>
