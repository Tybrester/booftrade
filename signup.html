<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoofCapital — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --accent: #00e676;
      --accent-dim: #00c853;
      --text: #f5f5f5;
      --muted: #888;
      --card-bg: #141414;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      height: 64px;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    .nav-back {
      font-size: 0.88rem;
      color: var(--muted);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--text); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      position: relative;
      overflow: hidden;
    }

    main::before {
      content: '';
      position: absolute;
      top: -150px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse at center, rgba(0,230,118,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    .card-header { margin-bottom: 32px; }

    .card-header h1 {
      font-size: 1.9rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .card-header h1 span { color: var(--accent); }

    .card-header p {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.95rem;
      padding: 12px 16px;
      border-radius: 8px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: #444; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #000;
      font-weight: 800;
      font-size: 1rem;
      padding: 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin-top: 8px;
      font-family: inherit;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 0 24px rgba(0,230,118,0.25);
    }

    .btn-submit:hover {
      background: var(--accent-dim);
      transform: translateY(-1px);
      box-shadow: 0 0 36px rgba(0,230,118,0.4);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .signin-link {
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .signin-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .signin-link a:hover { text-decoration: underline; }

    .terms {
      text-align: center;
      font-size: 0.78rem;
      color: #555;
      margin-top: 20px;
      line-height: 1.5;
    }

    .terms a { color: #666; text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 32px 24px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Boof<span style="color:var(--accent);">Capital</span></a>
    <a href="index.html" class="nav-back">← Back to Home</a>
  </nav>

  <main>
    <div class="card">
      <div class="card-header">
        <h1>Create your <span>account</span></h1>
        <p>Start building your trading system in minutes.</p>
      </div>

      <div id="msg" style="display:none;padding:12px 16px;border-radius:8px;font-size:0.88rem;font-weight:600;margin-bottom:16px;"></div>
      <form id="signup-form">
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input id="first-name" type="text" placeholder="John" />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input id="last-name" type="text" placeholder="Doe" />
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input id="email" type="email" placeholder="john@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="password" type="password" placeholder="Min. 8 characters" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input id="confirm-password" type="password" placeholder="Repeat your password" />
        </div>

        <button type="submit" class="btn-submit">Create Account</button>
      </form>

      <div class="divider">or</div>

      <div class="signin-link">
        Already have an account? <a href="signin.html">Sign in</a>
      </div>

      <p class="terms">By creating an account you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://isanhutzyctcjygjhzbn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzYW5odXR6eWN0Y2p5Z2poemJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTYzNDYsImV4cCI6MjA5MTY5MjM0Nn0.L0ATp-IriR708C2n3as_YXDgjHvtn_CWubbzPeSxRi0';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('signup-form');
    const msg = document.getElementById('msg');

    function showMsg(text, success) {
      msg.textContent = text;
      msg.style.display = 'block';
      msg.style.background = success ? 'rgba(0,230,118,0.1)' : 'rgba(255,23,68,0.1)';
      msg.style.color = success ? '#00e676' : '#ff1744';
      msg.style.border = success ? '1px solid rgba(0,230,118,0.3)' : '1px solid rgba(255,23,68,0.3)';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('first-name').value.trim();
      const lastName = document.getElementById('last-name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (!firstName || !lastName || !email || !password) {
        return showMsg('Please fill in all fields.', false);
      }
      if (password !== confirm) {
        return showMsg('Passwords do not match.', false);
      }
      if (password.length < 8) {
        return showMsg('Password must be at least 8 characters.', false);
      }

      const btn = form.querySelector('.btn-submit');
      btn.textContent = 'Creating account...';
      btn.disabled = true;

      const { data, error } = await sbClient.auth.signUp({
        email,
        password,
        options: { data: { first_name: firstName, last_name: lastName } }
      });

      btn.textContent = 'Create Account';
      btn.disabled = false;

      if (error) {
        showMsg(error.message, false);
      } else {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
