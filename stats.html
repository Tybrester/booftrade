    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzYW5odXR6eWN0Y2p5Z2poemJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTYzNDYsImV4cCI6MjA5MTY5MjM0Nn0.L0ATp-IriR708C2n3as_YXDgjHvtn_CWubbzPeSxRi0';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Global state
    let globalStockBots = [];
    let globalOptionsBots = [];

    // ─────────────────────────────────────────────
    // FUTURES P&L CALCULATION (Real contract specs)
    // ─────────────────────────────────────────────
    function getFuturesTickValue(symbol) {
      const specs = {
        'ES=F': { tickSize: 0.25, tickValue: 12.50 },      // E-mini S&P 500
        'NQ=F': { tickSize: 0.25, tickValue: 5.00 },       // E-mini NASDAQ
        'YM=F': { tickSize: 1, tickValue: 5.00 },          // E-mini Dow
        'RTY=F': { tickSize: 0.1, tickValue: 5.00 },       // E-mini Russell 2000
        'CL=F': { tickSize: 0.01, tickValue: 10.00 },      // Crude Oil
        'GC=F': { tickSize: 0.1, tickValue: 10.00 },        // Gold
        'SI=F': { tickSize: 0.005, tickValue: 25.00 },     // Silver
        'HG=F': { tickSize: 0.0005, tickValue: 12.50 },    // Copper
        'NG=F': { tickSize: 0.001, tickValue: 10.00 },     // Natural Gas
        'ZN=F': { tickSize: 0.015625, tickValue: 15.625 }, // 10-Year T-Note
        'ZB=F': { tickSize: 0.03125, tickValue: 31.25 },   // 30-Year T-Bond
        'ZF=F': { tickSize: 0.0078125, tickValue: 7.8125 },// 5-Year T-Note
        '6E=F': { tickSize: 0.0001, tickValue: 12.50 },    // Euro FX
        '6J=F': { tickSize: 0.000001, tickValue: 12.50 },  // Japanese Yen
        '6B=F': { tickSize: 0.0001, tickValue: 6.25 },     // British Pound
        '6C=F': { tickSize: 0.0001, tickValue: 10.00 },    // Canadian Dollar
        '6A=F': { tickSize: 0.0001, tickValue: 10.00 },    // Australian Dollar
        'ZW=F': { tickSize: 0.25, tickValue: 12.50 },      // Wheat
        'ZC=F': { tickSize: 0.25, tickValue: 12.50 },      // Corn
        'ZS=F': { tickSize: 0.25, tickValue: 12.50 },      // Soybeans
        'ZL=F': { tickSize: 0.01, tickValue: 600.00 },     // Soybean Oil
      };
      return specs[symbol] || { tickSize: 0.01, tickValue: 1 }; // Default to stock-like
    }

    function calcFuturesPnL(symbol, entryPrice, exitPrice, qty, action) {
      if (!symbol.includes('=F')) {
        // Not a futures symbol - use stock calculation
        return action === 'buy'
          ? (exitPrice - entryPrice) * qty
          : (entryPrice - exitPrice) * qty;
      }

      // Calculate point difference
      const pointDiff = action === 'buy'
        ? exitPrice - entryPrice
        : entryPrice - exitPrice;

      // Get contract specs
      const { tickSize, tickValue } = getFuturesTickValue(symbol);

      // Calculate P&L: (point difference / tick size) * tick value * quantity
      const ticks = pointDiff / tickSize;
      const pnl = ticks * tickValue * qty;

      return pnl;
    }

    // Clear all trade data (user must type CONFIRM)
    async function clearAllData() {
      const confirmText = prompt('Type DELETE to permanently clear ALL trade data. This cannot be undone!');
      if (confirmText !== 'DELETE') {
        alert('Data NOT cleared. Type DELETE to confirm.');
        return;
      }
      
      try {
        // Get current user
        const { data: { user } } = await sbClient.auth.getUser();
        if (!user) {
          alert('Not logged in');
          return;
        }
        
        // Delete all trades for this user
        const { error: stockError } = await sbClient
          .from('stock_trades')
          .delete()
          .eq('user_id', user.id);

        const { error: optionsError } = await sbClient
          .from('options_trades')
          .delete()
          .eq('user_id', user.id);

        if (stockError || optionsError) {
          alert('Error clearing data: ' + (stockError?.message || optionsError?.message));
          return;
        }

        // Reset adaptive P&L data (clear adapted_at timestamps from symbol_rules)
        const { data: stockBots } = await sbClient.from('stock_bots').select('id,symbol_rules').eq('user_id', user.id);
        for (const bot of stockBots || []) {
          if (bot.symbol_rules && bot.symbol_rules.length > 0) {
            const resetRules = bot.symbol_rules.map(r => ({ ...r, adapted_at: null, tp: r.tp || 15, sl: r.sl || -5 }));
            await sbClient.from('stock_bots').update({ symbol_rules: resetRules }).eq('id', bot.id);
          }
        }

        const { data: optionsBots } = await sbClient.from('options_bots').select('id,symbol_rules').eq('user_id', user.id);
        for (const bot of optionsBots || []) {
          if (bot.symbol_rules && bot.symbol_rules.length > 0) {
            const resetRules = bot.symbol_rules.map(r => ({ ...r, adapted_at: null, tp: r.tp || 50, sl: r.sl || -25 }));
            await sbClient.from('options_bots').update({ symbol_rules: resetRules }).eq('id', bot.id);
          }
        }

        alert('All trade data cleared! Adaptive P&L reset.');
        location.reload();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    // Recalculate P&L for all closed trades that have $0 or missing P&L
    async function recalculateAllPnl() {
      if (!confirm('Recalculate P&L for all closed trades with $0 P&L?\n\nThis will fetch current prices and recalculate profit/loss.')) return;
      
      console.log('[Recalc] Starting P&L recalculation...');
      
      try {
        const { data: { user } } = await sbClient.auth.getUser();
        if (!user) {
          alert('Not logged in');
          return;
        }
        
        // Get all closed stock trades with $0 P&L
        const { data: zeroPnlTrades, error } = await sbClient
          .from('trades')
          .select('*, stock_bots!inner(user_id)')
          .eq('source', 'auto-bot')
          .eq('status', 'closed')
          .eq('pnl', 0)
          .eq('stock_bots.user_id', user.id);
        
        if (error) {
          console.error('[Recalc] Error fetching trades:', error);
          alert('Error fetching trades: ' + error.message);
          return;
        }
        
        if (!zeroPnlTrades || zeroPnlTrades.length === 0) {
          alert('No trades with $0 P&L found to recalculate.');
          return;
        }
        
        console.log(`[Recalc] Found ${zeroPnlTrades.length} trades to recalculate`);
        
        let recalcCount = 0;
        let totalNewPnl = 0;
        const errors = [];
        
        for (const trade of zeroPnlTrades) {
          try {
            // Get current price from get-price function
            let exitPrice = trade.exit_price || trade.price;
            try {
              const { data: session } = await sbClient.auth.getSession();
              const token = session?.session?.access_token || SUPABASE_KEY;
              const res = await fetch(`${SUPABASE_URL}/functions/v1/get-price?symbol=${encodeURIComponent(trade.symbol)}`, {
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
              });
              const json = await res.json();
              if (json.price) {
                exitPrice = json.price;
              }
            } catch (priceErr) {
              console.log(`[Recalc] Price fetch failed for ${trade.symbol}:`, priceErr.message);
            }
            
            const qty = Number(trade.quantity);
            const entryPrice = Number(trade.price);

            // Recalculate P&L with realistic futures contract specs
            const newPnl = calcFuturesPnL(trade.symbol, entryPrice, exitPrice, qty, trade.action);
            
            // Update the trade
            const { error: updateError } = await sbClient
              .from('trades')
              .update({
                exit_price: exitPrice,
                pnl: newPnl
              })
              .eq('id', trade.id);
            
            if (updateError) {
              errors.push(`${trade.symbol}: ${updateError.message}`);
              continue;
            }
            
            recalcCount++;
            totalNewPnl += newPnl;
            console.log(`[Recalc] Updated ${trade.symbol} | Old P&L: $0.00 | New P&L: $${newPnl.toFixed(2)}`);
            
          } catch (err) {
            errors.push(`${trade.symbol}: ${err.message}`);
          }
        }
        
        // Refresh stats
        await loadStats();
        
        const msg = `Recalculated ${recalcCount} trade(s)\nTotal P&L: $${totalNewPnl.toFixed(2)}${errors.length > 0 ? '\n\nErrors:\n' + errors.join('\n') : ''}`;
        alert(msg);
        console.log(`[Recalc] Completed. Recalculated ${recalcCount} trades. Total P&L: $${totalNewPnl.toFixed(2)}`);
        
      } catch (err) {
        console.error('[Recalc] Error:', err);
        alert('Error recalculating P&L: ' + err.message);
      }
    }

    async function loadStats() {
      try {
        // Get current user
        const { data: { user } } = await sbClient.auth.getUser();
        if (!user) {
          window.location.href = 'index.html';
          return;
        }

        // Load stock bots
        const { data: stockBots } = await sbClient
          .from('stock_bots')
          .select('*')
          .eq('user_id', user.id);

        // Load ALL trades for this user (closed trades have pnl set)
        const { data: allTrades } = await sbClient
          .from('trades')
          .select('*')
          .eq('user_id', user.id)
          .eq('status', 'closed')
          .order('created_at', { ascending: false });

        // Attach trades to their bots
        (stockBots || []).forEach(bot => {
          bot.trades = (allTrades || []).filter(t => t.bot_id === bot.id);
        });

        // Load options bots with trades
        const { data: optionsBots } = await sbClient
          .from('options_bots')
          .select('*, options_trades(*)')
          .eq('user_id', user.id);

        // Store globally
        globalStockBots = stockBots || [];
        globalOptionsBots = optionsBots || [];

        console.log(`Loaded ${globalStockBots.length} stock bots, ${globalOptionsBots.length} options bots, ${(allTrades||[]).length} closed trades`);

        // Render all bots together
        renderBotStats(stockBots || [], optionsBots || []);

      } catch (err) {
        console.error('Error loading stats:', err);
      }
    }

        const wins = trades.filter(t => (t.pnl || 0) > 0).length;
        const winRate = totalTrades > 0 ? ((wins / totalTrades) * 100).toFixed(1) : 0;
        
        // Build daily P&L breakdown
        const dailyMap = {};
        trades.forEach(t => {
          const day = (t.closed_at || t.created_at || '').slice(0,10);
          if (!day) return;
          if (!dailyMap[day]) dailyMap[day] = { pnl: 0, wins: 0, losses: 0 };
          dailyMap[day].pnl += (t.pnl || 0);
          if ((t.pnl || 0) > 0) dailyMap[day].wins++; else dailyMap[day].losses++;
        });
        const dailyRows = Object.entries(dailyMap).sort((a,b) => b[0].localeCompare(a[0])).map(([day, d]) => {
          const dp = d.pnl;
          const dLabel = new Date(day + 'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid #1a1a1a;font-size:0.8rem;">
            <span style="color:#888;">${dLabel}</span>
            <span style="color:#aaa;">${d.wins}W / ${d.losses}L</span>
            <span style="font-weight:600;color:${dp>=0?'#00e676':'#ff5252'}">${formatMoney(dp)}</span>
          </div>`;
        }).join('');

        botStatsHtml += `
          <div class="bot-stat-card" style="background:linear-gradient(135deg,#1a1a1a 0%,#0d0d0d 100%);border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:15px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;cursor:pointer;" onclick="toggleDailyPnl('daily-stock-${bot.id}')">
              <div style="display:flex;align-items:center;gap:10px;">
                <span style="font-size:1.1rem;font-weight:600;color:#e0e0e0;">${bot.name}</span>

              </div>
              <div style="display:flex;align-items:center;gap:10px;">
                <span style="font-size:0.85rem;color:#888;">${bot.bot_interval || '1m'} · ${bot.bot_signal || 'Boof 1.0'}</span>
                <span style="color:#555;font-size:0.8rem;">Daily ▾</span>
              </div>
            </div>
            <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);">
              <div class="stat-card" style="padding:15px;">
                <div class="stat-label">Total Trades</div>
                <div class="stat-value">${totalTrades}</div>
              </div>
              <div class="stat-card" style="padding:15px;">
                <div class="stat-label">Win Rate</div>
                <div class="stat-value ${winRate >= 50 ? 'positive' : 'negative'}">${winRate}%</div>
              </div>
              <div class="stat-card" style="padding:15px;">
                <div class="stat-label">Total P&L</div>
                <div class="stat-value ${pnl >= 0 ? 'positive' : 'negative'}">${formatMoney(pnl)}</div>
              </div>
              <div class="stat-card" style="padding:15px;">
                <div class="stat-label">Avg per Trade</div>
                <div class="stat-value ${totalTrades > 0 && pnl/totalTrades >= 0 ? 'positive' : totalTrades > 0 ? 'negative' : 'neutral'}">${totalTrades > 0 ? formatMoney(pnl/totalTrades) : '$0.00'}</div>
              </div>
            </div>
            <div id="daily-stock-${bot.id}" style="display:none;margin-top:12px;border-top:1px solid #1a1a1a;padding-top:10px;">
              <div style="font-size:0.72rem;font-weight:600;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;">Daily P&L Breakdown</div>
              ${dailyRows || '<div style="color:#444;font-size:0.8rem;padding:8px 0;">No trade history</div>'}
            </div>
          </div>
        `;
      });

      // Options Bot Stats
      optionsBots.forEach(bot => {
        const allTrades = bot.options_trades || [];
        const trades = allTrades.filter(t => t.status === 'closed');
        const openCount = allTrades.filter(t => t.status === 'open').length;
        const totalTrades = trades.length;
        const pnl = trades.reduce((sum, t) => sum + (Number(t.pnl) || 0), 0);
        const wins = trades.filter(t => (Number(t.pnl) || 0) > 0).length;
        const winRate = totalTrades > 0 ? ((wins / totalTrades) * 100).toFixed(1) : 0;
        
        // Build daily P&L breakdown
        const dailyMapO = {};
        trades.forEach(t => {
          const day = (t.closed_at || t.created_at || '').slice(0,10);
          if (!day) return;
          if (!dailyMapO[day]) dailyMapO[day] = { pnl: 0, wins: 0, losses: 0 };
          dailyMapO[day].pnl += (Number(t.pnl) || 0);
          if ((Number(t.pnl) || 0) > 0) dailyMapO[day].wins++; else dailyMapO[day].losses++;
        });
        const dailyRowsO = Object.entries(dailyMapO).sort((a,b) => b[0].localeCompare(a[0])).map(([day, d]) => {
          const dp = d.pnl;
          const dLabel = new Date(day + 'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid #1a1a1a;font-size:0.8rem;">
            <span style="color:#888;">${dLabel}</span>
            <span style="color:#aaa;">${d.wins}W / ${d.losses}L</span>
            <span style="font-weight:600;color:${dp>=0?'#00e676':'#ff5252'}">${formatMoney(dp)}</span>
          </div>`;
        }).join('');

        botStatsHtml += `
          <div class="bot-stat-card" style="background:linear-gradient(135deg,#1a1a00 0%,#0d0d00 100%);border:1px solid #332200;border-radius:12px;padding:20px;margin-bottom:15px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;cursor:pointer;" onclick="toggleDailyPnl('daily-opt-${bot.id}')">
              <div style="display:flex;align-items:center;gap:10px;">
                <span style="font-size:1.1rem;font-weight:600;color:#e0e0e0;">${bot.name}</span>
                <span style="background:#ffd70022;color:#ffd700;padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:600;">Options</span>
              </div>
              <div style="display:flex;align-items:center;gap:10px;">
                <span style="font-size:0.85rem;color:#888;">${bot.bot_expiry_type || 'weekly'} · ${bot.bot_signal || 'supertrend'}${openCount > 0 ? ` · <span style="color:#00e676">${openCount} open</span>` : ''}</span>
                <span style="color:#555;font-size:0.8rem;">Daily ▾</span>
              </div>
            </div>
            <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);">
              <div class="stat-card" style="padding:15px;">
                <div class="stat-label">Total Trades</div>
                <div class="stat-value">${totalTrades}</div>
              </div>
              <div class="stat-card" style="padding:15px;">
                <div class="stat-label">Win Rate</div>
                <div class="stat-value ${winRate >= 50 ? 'positive' : 'negative'}">${winRate}%</div>
              </div>
              <div class="stat-card" style="padding:15px;">
                <div class="stat-label">Total P&L</div>
                <div class="stat-value ${pnl >= 0 ? 'positive' : 'negative'}">${formatMoney(pnl)}</div>
              </div>
              <div class="stat-card" style="padding:15px;">
                <div class="stat-label">Avg per Trade</div>
                <div class="stat-value ${totalTrades > 0 && pnl/totalTrades >= 0 ? 'positive' : totalTrades > 0 ? 'negative' : 'neutral'}">${totalTrades > 0 ? formatMoney(pnl/totalTrades) : '$0.00'}</div>
              </div>
            </div>
            <div id="daily-opt-${bot.id}" style="display:none;margin-top:12px;border-top:1px solid #1a1a1a;padding-top:10px;">
              <div style="font-size:0.72rem;font-weight:600;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;">Daily P&L Breakdown</div>
              ${dailyRowsO || '<div style="color:#444;font-size:0.8rem;padding:8px 0;">No trade history</div>'}
            </div>
          </div>
        `;
      });

      container.innerHTML = botStatsHtml || '<div class="empty-state">No bots found</div>';
    }

    function toggleDailyPnl(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    function formatMoney(amount) {
      const sign = amount >= 0 ? '+' : '';
      return sign + '$' + amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function updateStatValue(id, value, isMoney) {
      const el = document.getElementById(id);
      el.textContent = isMoney ? formatMoney(value) : value.toLocaleString();
      el.className = 'stat-value ' + (value > 0 ? 'positive' : value < 0 ? 'negative' : 'neutral');
    }

    // Auth state listener - load stats when authenticated
    sbClient.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        loadStats();
      } else if (event === 'SIGNED_OUT') {
        window.location.href = 'index.html';
      }
    });

    // Try loading immediately if already logged in
    sbClient.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        loadStats();
      } else {
        window.location.href = 'index.html';
      }
    });

    // Auto-refresh stats every 30 seconds
    setInterval(() => {
      console.log('[Stats] Auto-refreshing...');
      loadStats();
    }, 30000);
  </script>
</body>
</html>
