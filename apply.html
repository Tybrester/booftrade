<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply for Access — BoofCapital</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111; --border: #1f1f1f;
      --accent: #00e676; --text: #f5f5f5; --muted: #888; --card: #141414;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

    .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 40px; }
    .logo span { color: var(--accent); }

    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 40px; width: 100%; max-width: 460px;
    }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
    .sub { color: var(--muted); font-size: 0.92rem; margin-bottom: 32px; line-height: 1.5; }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.83rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    input, textarea {
      width: 100%; background: #0e0e0e; border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.95rem;
      padding: 12px 14px; outline: none; transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 90px; }

    .btn {
      width: 100%; background: var(--accent); color: #000; border: none; border-radius: 8px;
      padding: 14px; font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s; margin-top: 8px;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .success {
      display: none; text-align: center; padding: 32px 0;
    }
    .success .check { font-size: 3rem; margin-bottom: 16px; }
    .success h2 { font-size: 1.3rem; margin-bottom: 8px; }
    .success p { color: var(--muted); font-size: 0.92rem; }

    .back { display: block; text-align: center; margin-top: 24px; color: var(--muted); font-size: 0.88rem; text-decoration: none; }
    .back:hover { color: var(--text); }

    .error-msg { color: #ff5252; font-size: 0.85rem; margin-top: 6px; display: none; }
  </style>
</head>
<body>

  <a href="index.html" class="logo" style="color:var(--text);text-decoration:none;">Boof<span style="color:var(--accent);">Capital</span><svg viewBox="0 0 100 80" style="height:1.2em;vertical-align:middle;margin-left:8px;display:inline-block;flex-shrink:0;" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M18 20 c-2-4-6-4-8-2s-1 6 1 8c-3 0-6 2-6 5s3 6 7 6c1 3 3 5 5 6l-1 8c0 2 1 3 3 3h4c2 0 3-1 3-3l-1-6c4-1 8-4 10-8 3 2 6 2 9 1 2 4 6 6 10 6 2 3 4 8 4 12h6c0-6-2-12-5-16 3-2 5-5 5-9 0-3-1-5-3-7 2-1 3-3 2-5s-3-3-5-2l-2 1c-2-3-5-5-9-5-3 0-6 1-8 3-2-1-5-2-8-2-6 0-11 3-13 8z"/></svg></a>

  <div class="card">
    <div id="form-view">
      <h1>Apply for Access</h1>
      <p class="sub">BoofCapital is currently invite-only. Submit your info and we'll review your application.</p>

      <form id="apply-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="John Smith" maxlength="100" required />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" maxlength="200" required />
        </div>
        <div class="form-group">
          <label>Why do you want access? <span style="color:#444;font-weight:400;">(optional)</span></label>
          <textarea id="reason" placeholder="Tell us a bit about your trading background..." maxlength="500"></textarea>
        </div>
        <p class="error-msg" id="error-msg">Something went wrong. Please try again.</p>
        <button type="submit" class="btn" id="submit-btn">Submit Application</button>
      </form>
    </div>

    <div class="success" id="success-view">
      <div class="check">✅</div>
      <h2>Application Submitted</h2>
      <p>We'll review your application and reach out to <strong id="confirmed-email"></strong> when access is granted.</p>
    </div>
  </div>

  <a href="signin.html" class="back">Already have an account? Sign in →</a>

  <script>
    const SUPABASE_URL = 'https://isanhutzyctcjygjhzbn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzYW5odXR6eWN0Y2p5Z2poemJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTYzNDYsImV4cCI6MjA5MTY5MjM0Nn0.L0ATp-IriR708C2n3as_YXDgjHvtn_CWubbzPeSxRi0';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('apply-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      const name  = document.getElementById('name').value.trim().slice(0, 100);
      const email = document.getElementById('email').value.trim().slice(0, 200);
      const reason = document.getElementById('reason').value.trim().slice(0, 500);

      if (!name || !email) return;
      btn.disabled = true;
      btn.textContent = 'Submitting…';
      errEl.style.display = 'none';

      const { error } = await sb.from('access_requests').insert({ name, email, reason, status: 'pending' });

      if (error) {
        if (error.code === '23505') {
          errEl.textContent = 'This email has already applied.';
        } else {
          errEl.textContent = 'Something went wrong. Please try again.';
        }
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Submit Application';
        return;
      }

      document.getElementById('confirmed-email').textContent = email;
      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success-view').style.display = 'block';
    });
  </script>
</body>
</html>
