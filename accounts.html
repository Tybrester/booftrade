<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EazyTrade — Accounts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #1f1f1f;
      --accent: #00e676; --accent-dim: #00c853; --red: #ff1744;
      --text: #f5f5f5; --muted: #888; --card-bg: #141414;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    #loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app { display: none; flex-direction: column; height: 100vh; overflow: hidden; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 72px; background: rgba(10,10,10,0.95); border-bottom: 1px solid var(--border); flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }

    .layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 260px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px 0; height: calc(100vh - 72px); position: sticky; top: 72px; overflow-y: auto; }
    .sidebar-section { padding: 5px 12px; font-size: 0.6rem; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 14px; }
    .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 8px 16px; border: none; border-left: 3px solid transparent; font-size: 0.82rem; font-weight: 500; color: var(--muted); text-decoration: none; transition: background 0.15s, color 0.15s; position: relative; background: none; font-family: inherit; width: 100%; text-align: left; cursor: pointer; }
    .sidebar-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .sidebar-item.active { background: rgba(0,230,118,0.08); color: var(--accent); border-left-color: var(--accent); font-weight: 600; }
    
    .sidebar-arrow { margin-left: auto; font-size: 0.75rem; color: #444; }
    .sidebar-bottom { margin-top: auto; padding: 16px 12px; border-top: 1px solid var(--border); }

    main { flex: 1; padding: 28px 36px; overflow-y: auto; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }

    .account-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 24px 28px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .account-info { display: flex; flex-direction: column; gap: 4px; }
    .account-name { font-size: 1rem; font-weight: 700; }
    .account-email { font-size: 0.85rem; color: var(--muted); }
    .account-meta { font-size: 0.78rem; color: #444; margin-top: 4px; }

    .account-stats { display: flex; gap: 32px; }

    .section-title { font-size: 0.72rem; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin: 28px 0 12px; }
    .broker-account-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .broker-account-card.paper { border-color: var(--accent); background: rgba(0,230,118,0.04); }
    .broker-account-card.connected { border-color: var(--accent); background: rgba(0,230,118,0.04); }
    .bac-name { font-size: 0.95rem; font-weight: 700; }
    .bac-type { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
    .bac-balance { text-align: right; }
    .bac-balance-val { font-size: 1.2rem; font-weight: 800; color: var(--accent); }
    .bac-balance-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
    .empty-accounts { color: var(--muted); font-size: 0.88rem; padding: 20px 0; }
    .empty-accounts a { color: var(--accent); text-decoration: none; }
    .stat { text-align: center; }
    .stat-val { font-size: 1.1rem; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

    .section-title { font-size: 0.72rem; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin: 28px 0 12px; }

    .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #161616; }
    .setting-label { font-size: 0.9rem; font-weight: 500; }
    .setting-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .btn-outline { background: transparent; border: 1px solid #2a2a2a; color: var(--text); font-size: 0.82rem; font-weight: 600; padding: 7px 18px; border-radius: 7px; cursor: pointer; font-family: inherit; transition: border-color 0.15s; }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: transparent; border: 1px solid #2a2a2a; color: var(--red); font-size: 0.82rem; font-weight: 600; padding: 7px 18px; border-radius: 7px; cursor: pointer; font-family: inherit; transition: border-color 0.15s; }
    .btn-danger:hover { border-color: var(--red); }

    @media (max-width: 900px) { .sidebar { display: none; } .account-stats { display: none; } }

    .user-dropdown { position: relative; }
    .user-dropdown-toggle { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; font-size: 0.88rem; color: var(--muted); font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .user-dropdown-toggle:hover { background: #1a1a1a; color: var(--text); }
    .user-dropdown-toggle::after { content: '▾'; font-size: 0.7rem; color: var(--accent); }
    .user-dropdown-menu { position: absolute; top: calc(100% + 8px); right: 0; min-width: 180px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.4); opacity: 0; visibility: hidden; transform: translateY(-8px); transition: all 0.2s; z-index: 100; }
    .user-dropdown.open .user-dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
    .user-dropdown-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; font-size: 0.85rem; color: var(--text); cursor: pointer; transition: background 0.2s; border: none; background: none; width: 100%; text-align: left; font-family: inherit; }
    .user-dropdown-item:hover { background: rgba(255,255,255,0.05); }
    .user-dropdown-item.red { color: var(--red); }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    @media (max-width: 900px) { .sidebar { display: none; } .hamburger { display: flex !important; } }
    .hamburger { display: none; flex-direction: column; justify-content: center; gap: 5px; width: 36px; height: 36px; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; }
    .sidebar-overlay.open { display: block; }
    .sidebar-drawer { position: fixed; top: 0; left: 0; width: 260px; height: 100vh; background: var(--surface); border-right: 1px solid var(--border); z-index: 201; transform: translateX(-100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; padding: 16px 0; overflow-y: auto; }
    .sidebar-drawer.open { transform: translateX(0); }
    .sidebar-drawer .drawer-close { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 16px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .sidebar-drawer .drawer-close .logo { font-size: 1.2rem; font-weight: 900; color: var(--text); text-decoration: none; }
    .sidebar-drawer .drawer-close .logo span { color: var(--accent); }
    .sidebar-drawer .drawer-close button { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; line-height: 1; }
  </style>
</head>
<body>

  <div id="loading-screen"><div class="spinner"></div></div>

  <div id="app">
    <nav>
      <button class="hamburger" onclick="toggleDrawer()" aria-label="Menu"><span></span><span></span><span></span></button>
      <a href="dashboard.html" class="logo">Boof<span style="color:var(--accent);">Capital</span></a>
      <div class="nav-right">
        <div class="user-dropdown" id="user-dropdown">
          <button class="user-dropdown-toggle" id="user-email-toggle">
            <span id="user-email"></span>
          </button>
          <div class="user-dropdown-menu">
            <button class="user-dropdown-item red" onclick="signOut()">
              <span>🚪</span> Sign Out
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeDrawer()"></div>
    <div class="sidebar-drawer" id="sidebar-drawer">
      <div class="drawer-close"><a href="dashboard.html" class="logo">Boof<span>Capital</span></a><button onclick="closeDrawer()">✕</button></div>
      <div class="sidebar-section">Menu</div>
      <a href="dashboard.html" class="sidebar-item">Dashboard</a>
      <a href="trades.html" class="sidebar-item">Trades</a>
      <a href="paper-market.html" class="sidebar-item">Paper Market</a>
      <a href="alerts.html" class="sidebar-item">Systems</a>
      <a href="accounts.html" class="sidebar-item active">Accounts</a>
      <a href="brokers.html" class="sidebar-item">Brokers</a>
      <div class="sidebar-section" style="margin-top:24px;">Bots</div>
      <a href="bots.html" class="sidebar-item">Bots</a>
      <a href="stats.html" class="sidebar-item">Statistics</a>
      <a href="backtest.html" class="sidebar-item">Backtest</a>
      <div class="sidebar-section" style="margin-top:24px;">Help</div>
      <a href="how-it-works.html" class="sidebar-item">How it Works</a>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-section">Menu</div>
        <a href="dashboard.html" class="sidebar-item">Dashboard</a>
        <a href="trades.html" class="sidebar-item">Trades</a>
        <a href="paper-market.html" class="sidebar-item">Paper Market</a>
        <a href="alerts.html" class="sidebar-item">Systems</a>
        <a href="accounts.html" class="sidebar-item">Accounts</a>
        <a href="brokers.html" class="sidebar-item">Brokers</a>
        <div id="bots-sidebar-section" style="display:none;">
        <div class="sidebar-section" style="margin-top:24px;">Bots</div>
        <a href="bots.html" class="sidebar-item">Bots</a>
        <a href="stats.html" class="sidebar-item">Statistics</a>
        <a href="backtest.html" class="sidebar-item">Backtest</a>
        </div>
        <div class="sidebar-section" style="margin-top:24px;">Help</div>
        <a href="how-it-works.html" class="sidebar-item">How it Works</a>
        <div style="margin-top:auto;">
          <div class="sidebar-section" style="display:none;" id="admin-sidebar-section">Admin</div>
          <a href="admin.html" class="sidebar-item" id="admin-sidebar-link" style="display:none;">Admin Panel</a>
        </div>
      </aside>

      <main>
        <div class="page-header">
          <h1>Account</h1>
        </div>

        <div id="connected-accounts-section"></div>

        <div style="text-align:center;padding:24px;font-size:0.85rem;color:#666;margin-top:auto;">
          Contact: <a href="mailto:BoofCapital@gmail.com" style="color:var(--muted);text-decoration:none;">BoofCapital@gmail.com</a>
        </div>
      </main>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://isanhutzyctcjygjhzbn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzYW5odXR6eWN0Y2p5Z2poemJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTYzNDYsImV4cCI6MjA5MTY5MjM0Nn0.L0ATp-IriR708C2n3as_YXDgjHvtn_CWubbzPeSxRi0';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const BROKER_KEYS = ['tastytrade'];

    async function init() {
      const { data: { session } } = await sbClient.auth.getSession();
      if (!session) { window.location.href = 'signin.html'; return; }

      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';

      const user = session.user;

      if (user.user_metadata?.paper_trading_enabled) {
        localStorage.setItem('paper_trading_enabled', 'true');
        if (user.user_metadata?.paper_balance) {
          localStorage.setItem('paper_balance', String(user.user_metadata.paper_balance));
        }
      }

      // Check paper trading in localStorage OR Supabase
      const paperInLocalStorage = localStorage.getItem('paper_trading_enabled') === 'true';
      const { data: paperAcct, error: paperErr } = await sbClient.from('paper_accounts').select('balance').eq('user_id', user.id).maybeSingle();
      console.log('[Accounts] paperInLocalStorage:', paperInLocalStorage, 'paperAcct:', paperAcct, 'error:', paperErr);
      const paperEnabled = paperInLocalStorage || !!paperAcct;
      const paperBalance = paperAcct?.balance ?? 100000;
      console.log('[Accounts] paperEnabled:', paperEnabled, 'paperBalance:', paperBalance);
      
      const section = document.getElementById('connected-accounts-section');

      let html = '<div class="section-title">Connected Accounts</div>';
      
      // Check for other brokers via localStorage (TradersPost webhooks)
      const connectedBrokers = BROKER_KEYS.filter(k => localStorage.getItem(`webhook_${k}`));
      
      // Check for tastytrade in both localStorage AND Supabase
      const tastyInLocalStorage = localStorage.getItem('webhook_tastytrade');
      const { data: tastyCredsCheck } = await sbClient.from('broker_credentials').select('id').eq('user_id', user.id).eq('broker', 'tastytrade').maybeSingle();
      const tastyConnected = tastyInLocalStorage || tastyCredsCheck;
      
      // Fetch Tastytrade balance via OAuth refresh token
      let tastyBalance = null;
      let tastyAccountValue = null;
      
      if (tastyConnected) {
        try {
          const balRes = await fetch(`${SUPABASE_URL}/functions/v1/tasty-oauth?action=balance&user_id=${user.id}`, {
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
          });
          const balJson = await balRes.json();
          if (balJson.account_value) {
            tastyAccountValue = balJson.account_value;
            tastyBalance = balJson.balance;
          }
        } catch (e) {
          console.log('[Accounts] Could not fetch Tastytrade balance:', e);
        }
      }

      console.log('[Accounts] Final check - paperEnabled:', paperEnabled, 'tastyConnected:', tastyConnected);
      if (!paperEnabled && !tastyConnected) {
        html += `<div class="empty-accounts">No accounts connected. <a href="brokers.html">Connect a broker →</a></div>`;
      } else {
        console.log('[Accounts] Rendering paper account:', paperEnabled);
        if (paperEnabled) {
          html += `
            <div class="broker-account-card paper">
              <div>
                <div class="bac-name">BoofCapital paper</div>
                <div class="bac-type">Paper Trading · Simulated</div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
                <div class="bac-balance" style="display:flex;flex-direction:column;align-items:flex-end;">
                  <div class="bac-balance-label">Available Balance</div>
                  <div class="bac-balance-val">$${paperBalance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
                </div>
                <button onclick="resetPaperBalance()" style="background:none;border:1px solid #333;color:#666;font-size:0.75rem;font-weight:700;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:inherit;transition:all 0.15s;" onmouseover="this.style.borderColor='#ff7043';this.style.color='#ff7043'" onmouseout="this.style.borderColor='#333';this.style.color='#666'">Reset to $100k</button>
              </div>
            </div>`;
        }
        
        // Fetch Alpaca balance if connected
        const { data: alpacaCreds } = await sbClient.from('broker_credentials').select('credentials').eq('user_id', user.id).eq('broker', 'alpaca').maybeSingle();
        if (alpacaCreds?.credentials?.api_key) {
          try {
            const env = alpacaCreds.credentials.env || 'paper';
            const baseUrl = env === 'live' ? 'https://api.alpaca.markets' : 'https://paper-api.alpaca.markets';
            const acctRes = await fetch(`${baseUrl}/v2/account`, {
              headers: { 
                'APCA-API-KEY-ID': alpacaCreds.credentials.api_key,
                'APCA-API-SECRET-KEY': alpacaCreds.credentials.secret_key
              }
            });
            if (acctRes.ok) {
              const acctJson = await acctRes.json();
              const alpacaBalance = parseFloat(acctJson.cash || acctJson.buying_power || 0);
              html += `
                <div class="broker-account-card connected">
                  <div>
                    <div class="bac-name">Alpaca ${env === 'live' ? 'Live' : 'Paper'}</div>
                    <div class="bac-type">${env === 'live' ? 'Live Trading' : 'Paper Trading'} · ${alpacaCreds.credentials.api_key.substring(0, 8)}...</div>
                  </div>
                  <div class="bac-balance" style="display:flex;flex-direction:column;align-items:flex-end;">
                    <div class="bac-balance-label">Available Balance</div>
                    <div class="bac-balance-val">$${alpacaBalance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
                  </div>
                </div>`;
            }
          } catch (e) {
            console.log('[Accounts] Could not fetch Alpaca balance:', e);
            html += `
              <div class="broker-account-card connected">
                <div>
                  <div class="bac-name">Alpaca</div>
                  <div class="bac-type">Connected · ${alpacaCreds.credentials.env || 'paper'}</div>
                </div>
                <div class="bac-balance">
                  <div class="bac-balance-val" style="font-size:0.85rem;color:var(--muted);">Connected</div>
                </div>
              </div>`;
          }
        }
        
        // Add Tastytrade with balance
        if (tastyConnected) {
          html += `
            <div class="broker-account-card connected">
              <div>
                <div class="bac-name">Tastytrade Live</div>
                <div class="bac-type">Live Trading · Direct API</div>
              </div>
              <div class="bac-balance" style="display:flex;flex-direction:column;align-items:flex-end;">
                <div class="bac-balance-label">Account Value</div>
                <div class="bac-balance-val">$${tastyAccountValue ? tastyAccountValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '0.00'}</div>
              </div>
            </div>`;
        }
        
        connectedBrokers.forEach(key => {
          if (key === 'tastytrade') return; // Already handled above
          const label = key.charAt(0).toUpperCase() + key.slice(1);
          html += `
            <div class="broker-account-card">
              <div>
                <div class="bac-name">${label}</div>
                <div class="bac-type">Live · Connected via TradersPost</div>
              </div>
              <div class="bac-balance">
                <div class="bac-balance-val" style="font-size:0.85rem;color:var(--muted);">Webhook Active</div>
                <div class="bac-balance-label">Signals Enabled</div>
              </div>
            </div>`;
        });
      }

      section.innerHTML = html;

      if (!localStorage.getItem('paper_balance')) {
        localStorage.setItem('paper_balance', '100000');
      }

      // User email in dropdown
      document.getElementById('user-email').textContent = user.email;
      // Show admin link if admin
      if (session.user.id === 'd0bb84ba-f968-446c-9792-9bcff8849e37') {
        const el = document.getElementById('admin-sidebar-link');
        const sec = document.getElementById('admin-sidebar-section');
        if (el) el.style.display = '';
        if (sec) sec.style.display = '';
      }
      // Show Bots sidebar if enabled (or admin)
      (async () => {
        const isAdmin = session.user.id === 'd0bb84ba-f968-446c-9792-9bcff8849e37';
        if (isAdmin) {
          const bsec = document.getElementById('bots-sidebar-section');
          if (bsec) bsec.style.display = '';
        } else {
          const { data: us } = await sbClient.from('user_settings').select('bots_enabled').eq('user_id', session.user.id).maybeSingle();
          if (us?.bots_enabled) {
            const bsec = document.getElementById('bots-sidebar-section');
            if (bsec) bsec.style.display = '';
          }
        }
      })();

      // User dropdown toggle
      const dropdown = document.getElementById('user-dropdown');
      const toggle = document.getElementById('user-email-toggle');
      
      toggle.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('open');
      });

      document.addEventListener('click', (e) => {
        if (!dropdown.contains(e.target)) {
          dropdown.classList.remove('open');
        }
      });
    }

    async function resetPaperBalance() {
      const overlay = document.createElement('div');
      overlay.id = 'reset-modal';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9999;';
      
      const modal = document.createElement('div');
      modal.style.cssText = 'background:var(--surface);border-radius:12px;padding:28px 32px;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);';
      
      modal.innerHTML = `
        <div style="font-size:2rem;margin-bottom:12px;">🔄</div>
        <div style="font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:12px;">Reset Paper Trading?</div>
        <div style="font-size:0.9rem;color:var(--muted);line-height:1.5;margin-bottom:24px;">This will:<br>• Reset balance to <strong style="color:var(--accent);">$100,000</strong><br>• <strong style="color:var(--red);">Delete ALL trades</strong><br>• Clear your trading history</div>
        <div style="display:flex;gap:12px;justify-content:center;">
          <button id="reset-cancel" style="background:transparent;border:1px solid #555;color:#888;font-weight:600;padding:10px 20px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.85rem;">Cancel</button>
          <button id="reset-confirm" style="background:var(--red);color:#fff;font-weight:700;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:0.85rem;">Reset Everything</button>
        </div>
      `;
      
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
      
      document.getElementById('reset-cancel').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
      
      document.getElementById('reset-confirm').addEventListener('click', async () => {
        overlay.remove();
        localStorage.setItem('paper_balance', '100000');
        const { data: { session } } = await sbClient.auth.getSession();
        if (session) {
          const { error: deleteError } = await sbClient.from('trades')
            .delete()
            .eq('user_id', session.user.id);
          
          if (deleteError) {
            console.error('Delete trades error:', deleteError);
            alert('Failed to delete trades: ' + deleteError.message);
            return;
          }
          
          const { error: updateError } = await sbClient.from('paper_accounts')
            .update({ balance: 100000, updated_at: new Date().toISOString() })
            .eq('user_id', session.user.id);
          
          if (updateError) {
            console.error('Reset error:', updateError);
            alert('Failed to reset: ' + updateError.message);
            return;
          }
        }
        const toast = document.createElement('div');
        toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-weight:700;padding:12px 24px;border-radius:8px;z-index:10000;animation:slideDown 0.3s ease;';
        toast.textContent = '✓ Paper trading reset - All trades deleted, balance $100,000';
        document.body.appendChild(toast);
        setTimeout(() => { 
          toast.remove();
          window.location.href = 'dashboard.html';
        }, 1500);
      });
    }

    function toggleDrawer() { document.getElementById('sidebar-drawer').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
    function closeDrawer() { document.getElementById('sidebar-drawer').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }
    async function signOut() {
      await sbClient.auth.signOut();
      window.location.href = 'index.html';
    }

    init();
  </script>
</body>
</html>
